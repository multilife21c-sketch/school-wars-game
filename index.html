<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BRAWL ARENA — 탑다운 액션 슈터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Jua&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1b2a; --bg2:#14263b;
    --ink:#f4f7ff; --muted:#9fb3c8;
    --accent:#ffd23f; --accent2:#ff5c8a; --good:#3ddc97; --bad:#ff4d4d;
    --panel:rgba(13,27,42,.82);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:'Outfit',system-ui,sans-serif;touch-action:none;user-select:none;}
  #app{position:fixed;inset:0;}
  canvas{display:block;position:absolute;inset:0;width:100%;height:100%;}

  /* ---- Overlays ---- */
  .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:18px;padding:24px;z-index:30;
    background:radial-gradient(120% 120% at 50% 0%, #1b3a5b 0%, #0a1521 70%);}
  .hidden{display:none!important;}
  .logo{font-family:'Bungee',sans-serif;font-size:clamp(34px,9vw,76px);line-height:.95;
    letter-spacing:2px;text-align:center;
    background:linear-gradient(180deg,#fff,#ffd23f 60%,#ff8c42);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 6px 0 rgba(0,0,0,.25);}
  .logo small{display:block;font-family:'Jua';font-size:clamp(13px,3.4vw,20px);
    letter-spacing:3px;color:var(--muted);-webkit-text-fill-color:var(--muted);margin-top:6px;}
  .tip{color:var(--muted);font-size:14px;max-width:520px;text-align:center;line-height:1.5;}

  .btn{font-family:'Jua';font-size:clamp(17px,4.6vw,22px);border:none;cursor:pointer;
    color:#1a1205;padding:14px 30px;border-radius:16px;
    background:linear-gradient(180deg,#ffe071,#ffd23f);
    box-shadow:0 6px 0 #b88a13, 0 10px 22px rgba(0,0,0,.4);
    transition:transform .06s, box-shadow .06s;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #b88a13,0 6px 14px rgba(0,0,0,.4);}
  .btn.alt{background:linear-gradient(180deg,#46e0a0,#2bbf86);box-shadow:0 6px 0 #15795a,0 10px 22px rgba(0,0,0,.4);color:#062b1d;}
  .btn.alt:active{box-shadow:0 2px 0 #15795a,0 6px 14px rgba(0,0,0,.4);}

  /* ---- Character select ---- */
  .select-wrap{width:min(960px,100%);}
  .select-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
  .select-head h2{font-family:'Bungee';margin:0;font-size:clamp(20px,5vw,30px);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:12px;
    max-height:46vh;overflow-y:auto;padding:6px;}
  .card{background:linear-gradient(180deg,#1d3650,#142436);border:2px solid #28415c;border-radius:16px;
    padding:12px;cursor:pointer;position:relative;transition:transform .1s,border-color .1s;}
  .card:hover{transform:translateY(-3px);}
  .card.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,210,63,.3),0 8px 20px rgba(0,0,0,.4);}
  .card .ava{width:54px;height:54px;border-radius:50%;margin:0 auto 8px;display:block;
    box-shadow:inset 0 -6px 0 rgba(0,0,0,.25);}
  .card .nm{font-family:'Jua';text-align:center;font-size:15px;}
  .card .role{text-align:center;font-size:11px;color:var(--muted);margin-top:2px;}
  .stats{display:flex;flex-direction:column;gap:5px;margin-top:9px;}
  .stat{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);}
  .stat b{width:26px;display:inline-block;}
  .bar{flex:1;height:6px;border-radius:4px;background:#0a1521;overflow:hidden;}
  .bar i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,#3ddc97,#ffd23f);}
  .detail{background:var(--panel);border:1px solid #28415c;border-radius:16px;padding:14px 16px;
    margin-top:12px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .detail .big{font-family:'Bungee';font-size:20px;}
  .detail .desc{color:var(--muted);font-size:13px;flex:1;min-width:180px;line-height:1.4;}

  /* ---- HUD ---- */
  #hud{position:absolute;inset:0;z-index:20;pointer-events:none;}
  .topbar{position:absolute;top:max(10px,env(safe-area-inset-top));left:0;right:0;
    display:flex;justify-content:center;gap:8px;padding:0 12px;}
  .badge{background:var(--panel);border:1px solid #2a4660;border-radius:12px;
    padding:6px 12px;font-family:'Jua';font-size:14px;display:flex;align-items:center;gap:8px;}
  .badge.alive b{color:var(--good);}
  .pill{position:absolute;top:max(10px,env(safe-area-inset-top));right:max(10px,env(safe-area-inset-right));
    background:var(--panel);border:1px solid #2a4660;border-radius:12px;padding:6px 10px;font-size:13px;color:var(--muted);}

  /* Mobile controls */
  #touch{position:absolute;inset:0;z-index:22;display:none;}
  .stick{position:absolute;bottom:max(28px,env(safe-area-inset-bottom));width:128px;height:128px;
    border-radius:50%;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.16);
    pointer-events:auto;touch-action:none;}
  #stickL{left:max(22px,env(safe-area-inset-left));}
  #stickR{right:max(22px,env(safe-area-inset-right));border-color:rgba(255,92,138,.4);background:rgba(255,92,138,.07);}
  .knob{position:absolute;left:50%;top:50%;width:54px;height:54px;margin:-27px 0 0 -27px;border-radius:50%;
    background:linear-gradient(180deg,#fff,#cfe);box-shadow:0 4px 10px rgba(0,0,0,.4);transition:opacity .15s;}
  #stickR .knob{background:linear-gradient(180deg,#ffd1de,#ff5c8a);}
  .stick .lbl{position:absolute;left:0;right:0;bottom:-22px;text-align:center;font-family:'Jua';
    font-size:12px;color:var(--muted);}
  #superBtn{position:absolute;right:max(160px,calc(env(safe-area-inset-right) + 158px));
    bottom:max(86px,calc(env(safe-area-inset-bottom) + 58px));
    width:74px;height:74px;border-radius:50%;pointer-events:auto;border:3px solid #ffe071;
    background:radial-gradient(circle at 50% 35%,#ffe071,#ff8c42);font-family:'Bungee';font-size:11px;color:#3a1f02;
    display:flex;align-items:center;justify-content:center;opacity:.45;touch-action:none;}
  #superBtn.ready{opacity:1;animation:pulse 1s infinite;}
  @keyframes pulse{50%{box-shadow:0 0 0 8px rgba(255,210,63,.25);}}

  /* Result */
  .resultTitle{font-family:'Bungee';font-size:clamp(32px,11vw,84px);}
  .win{color:var(--accent);text-shadow:0 0 24px rgba(255,210,63,.5);}
  .lose{color:var(--bad);}
  .kbd{display:inline-block;background:#0a1521;border:1px solid #2a4660;border-bottom-width:3px;
    border-radius:6px;padding:1px 7px;font-family:monospace;font-size:13px;margin:0 1px;}
</style>
</head>
<body>
<div id="app">
  <canvas id="cv"></canvas>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="topbar">
      <div class="badge alive" id="scoreBadge">생존 <b>1</b></div>
      <div class="badge" id="charBadge">캐릭터</div>
    </div>
    <div class="pill" id="hintPill"></div>
  </div>

  <!-- Mobile touch controls -->
  <div id="touch">
    <div id="stickL" class="stick"><div class="knob"></div><div class="lbl">이동</div></div>
    <div id="stickR" class="stick"><div class="knob"></div><div class="lbl">조준 · 발사</div></div>
    <div id="superBtn">SUPER</div>
  </div>

  <!-- Main menu -->
  <div id="menu" class="overlay">
    <div class="logo">BRAWL ARENA<small>TOP-DOWN ACTION SHOOTER</small></div>
    <p class="tip" id="ctrlTip"></p>
    <button class="btn alt" id="toSelect">게임 시작 ▶</button>
    <p class="tip" style="font-size:12px;opacity:.7">연습 모드 · 봇 AI 포함 · 멀티플레이 연동 지점 내장</p>
  </div>

  <!-- Character select -->
  <div id="select" class="overlay hidden">
    <div class="select-wrap">
      <div class="select-head">
        <h2>캐릭터 선택</h2>
        <button class="btn" id="backMenu" style="padding:8px 18px;font-size:15px">← 뒤로</button>
      </div>
      <div class="grid" id="charGrid"></div>
      <div class="detail" id="charDetail"></div>
      <div id="modeRow" style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap"></div>
      <div class="tip" id="modeDesc" style="margin-top:8px;text-align:left"></div>
      <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap">
        <button class="btn alt" id="startGame" style="flex:1">연습 시작 🤖</button>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div id="result" class="overlay hidden">
    <div class="resultTitle" id="resultText">VICTORY</div>
    <p class="tip" id="resultSub"></p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <button class="btn alt" id="rematch">다시 하기 🔁</button>
      <button class="btn" id="changeChar">캐릭터 변경</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* =====================================================================
   BRAWL ARENA — 단일 파일 탑다운 액션 슈터
   구조
     1) CHARACTERS  : config 기반 10캐릭터 (스탯/공격방식/슈퍼) → Phase 4 확장 지점
     2) Input       : PC(WASD+마우스) / 모바일(듀얼 조이스틱) 자동 분기
     3) World/Engine: 고정월드 + 카메라 추적, 충돌, 투사체, 부쉬
     4) Bot AI      : 연습 모드용 더미 봇 (Phase 2)
     5) Net (stub)  : 멀티플레이 연동 인터페이스 → Phase 3 에서 PartyKit 등 연결
   ===================================================================== */

/* ----------------------------------------------------------------
   1. CHARACTER CONFIG  (하드코딩 금지 — 데이터로 분리, 밸런스 패치 용이)
   attack.type: single | spread | rapid | lob | sniper | homing
   super.type : burst | dash | heal | shield | nova
   ---------------------------------------------------------------- */
const CHARACTERS = [
  { id:"vega", name:"베가", role:"올라운더", color:"#4dabf7", desc:"균형 잡힌 단발 사격수. 입문에 최적.",
    speed:175, hp:3400, radius:20, reload:1.5, ammo:3,
    attack:{type:"single", damage:760, range:560, projSpeed:760, projRadius:8, count:1, spread:0},
    super:{type:"burst", charge:2400, damage:900, count:5, spread:0.42, projSpeed:820, range:560, desc:"부채꼴 5연발"} },

  { id:"goliath", name:"골리앗", role:"탱커", color:"#f783ac", desc:"높은 체력, 근거리 산탄. 정면 돌파형.",
    speed:150, hp:5200, radius:25, reload:1.7, ammo:2,
    attack:{type:"spread", damage:380, range:330, projSpeed:640, projRadius:7, count:5, spread:0.55},
    super:{type:"shield", charge:2600, value:2500, duration:5, desc:"5초간 보호막 +2500"} },

  { id:"hawk", name:"호크", role:"저격수", color:"#ffa94d", desc:"초장거리 관통탄. 체력은 낮음.",
    speed:165, hp:2600, radius:18, reload:1.9, ammo:1,
    attack:{type:"sniper", damage:1600, range:920, projSpeed:1500, projRadius:6, count:1, spread:0, pierce:true},
    super:{type:"burst", charge:2500, damage:2200, count:1, spread:0, projSpeed:1700, range:1000, pierce:true, desc:"초강력 관통 저격"} },

  { id:"twin", name:"트윈", role:"근접 산탄", color:"#69db7c", desc:"근접 광역 샷건. 붙으면 강함.",
    speed:185, hp:3600, radius:20, reload:1.4, ammo:3,
    attack:{type:"spread", damage:300, range:300, projSpeed:600, projRadius:7, count:7, spread:0.75},
    super:{type:"dash", charge:2200, distance:260, damage:1100, desc:"대시 돌진 + 광역 피해"} },

  { id:"dash", name:"대시", role:"암살자", color:"#da77f2", desc:"빠른 이동속도, 짧은 사거리 연사.",
    speed:215, hp:2900, radius:18, reload:1.1, ammo:4,
    attack:{type:"rapid", damage:300, range:380, projSpeed:780, projRadius:5, count:1, spread:0.06},
    super:{type:"dash", charge:2000, distance:320, damage:700, desc:"장거리 대시 추격"} },

  { id:"boom", name:"붐", role:"포격수", color:"#ff8787", desc:"포물선 폭탄으로 광역 피해.",
    speed:160, hp:3400, radius:21, reload:1.8, ammo:3,
    attack:{type:"lob", damage:900, range:520, projSpeed:520, projRadius:9, count:1, spread:0, aoe:78},
    super:{type:"nova", charge:2600, damage:1500, radius:150, desc:"자기 주변 대폭발"} },

  { id:"medic", name:"메딕", role:"서포터", color:"#3bc9db", desc:"중거리 사격 + 자가 회복 슈퍼.",
    speed:170, hp:3200, radius:19, reload:1.5, ammo:3,
    attack:{type:"single", damage:600, range:520, projSpeed:720, projRadius:7, count:1, spread:0},
    super:{type:"heal", charge:2300, value:2400, desc:"즉시 체력 회복 +2400"} },

  { id:"rapid", name:"래피드", role:"기관총", color:"#ffd43b", desc:"초고연사, 발당 피해는 낮음.",
    speed:178, hp:3000, radius:19, reload:1.0, ammo:6,
    attack:{type:"rapid", damage:200, range:460, projSpeed:880, projRadius:4, count:1, spread:0.09},
    super:{type:"burst", charge:2200, damage:260, count:14, spread:0.5, projSpeed:900, range:460, desc:"14발 탄막 난사"} },

  { id:"guard", name:"가디언", role:"방어형", color:"#748ffc", desc:"단단한 체력과 보호막 운영.",
    speed:158, hp:4600, radius:24, reload:1.6, ammo:2,
    attack:{type:"spread", damage:420, range:400, projSpeed:680, projRadius:7, count:3, spread:0.3},
    super:{type:"shield", charge:2400, value:3200, duration:6, desc:"6초간 보호막 +3200"} },

  { id:"spirit", name:"스피릿", role:"유도탄", color:"#e599f7", desc:"적을 추적하는 유도 정령탄.",
    speed:172, hp:2800, radius:18, reload:1.6, ammo:3,
    attack:{type:"homing", damage:520, range:560, projSpeed:520, projRadius:7, count:1, spread:0, turn:3.4},
    super:{type:"burst", charge:2300, damage:620, count:3, spread:0.35, projSpeed:560, range:560, homing:true, turn:3.4, desc:"유도탄 3연발"} },
];
const byId = id => CHARACTERS.find(c=>c.id===id);

/* ----------------------------------------------------------------
   2. CANVAS / GLOBAL
   ---------------------------------------------------------------- */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let DPR = Math.min(window.devicePixelRatio||1, 2);
let VW = 0, VH = 0;                 // viewport(px)
const WORLD = { w:2200, h:1500 };   // 고정 월드 크기
const cam = { x:0, y:0, zoom:1, zoomBase:1, zoomPunch:0, sx:0, sy:0 };
let rings=[], flashes=[], screenFlash=0, shake=0, hitstop=0;

const IS_TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints>0
  || matchMedia('(pointer:coarse)').matches;

function resize(){
  VW = window.innerWidth; VH = window.innerHeight;
  DPR = Math.min(window.devicePixelRatio||1, 2);
  cv.width = Math.floor(VW*DPR); cv.height = Math.floor(VH*DPR);
  // 줌: 화면이 작으면 더 넓게 보이도록(모바일 가독성). 기준 가시폭 860px.
  cam.zoomBase = Math.min(VW, VH) < 560 ? Math.max(VW,VH)/980 : Math.min(VW,VH)/620;
  cam.zoomBase = Math.max(0.5, Math.min(1.4, cam.zoomBase)); cam.zoom = cam.zoomBase;
}
window.addEventListener('resize', resize, {passive:true});
window.addEventListener('orientationchange', ()=>setTimeout(resize,100));
resize();

/* ----------------------------------------------------------------
   3. INPUT  (PC: 키보드+마우스 / 모바일: 듀얼 조이스틱)
   공통 출력: input.move{x,y}, input.aim{x,y}, input.firing, input.superReq
   ---------------------------------------------------------------- */
const input = { move:{x:0,y:0}, aim:{x:1,y:0}, firing:false, superReq:false, hasAim:false };
const keys = {};

if(!IS_TOUCH){
  addEventListener('keydown', e=>{ keys[e.key.toLowerCase()]=true;
    if(e.key===' '||e.key.toLowerCase()==='q'){ input.superReq=true; e.preventDefault(); } });
  addEventListener('keyup',   e=>{ keys[e.key.toLowerCase()]=false; });
  let mx=VW/2, my=VH/2;
  cv.addEventListener('mousemove', e=>{ mx=e.clientX; my=e.clientY; });
  cv.addEventListener('mousedown', e=>{ if(e.button===0) input.firing=true;
    if(e.button===2){ input.superReq=true; } });
  addEventListener('mouseup',   e=>{ if(e.button===0) input.firing=false; });
  cv.addEventListener('contextmenu', e=>e.preventDefault());
  // PC 입력 매 프레임 갱신
  window.__readPC = ()=>{
    let dx=0,dy=0;
    if(keys['w']||keys['arrowup'])dy-=1; if(keys['s']||keys['arrowdown'])dy+=1;
    if(keys['a']||keys['arrowleft'])dx-=1; if(keys['d']||keys['arrowright'])dx+=1;
    const m=Math.hypot(dx,dy)||1; input.move.x=dx/m; input.move.y=dy/m;
    // 조준: 마우스 → 월드 → 플레이어 기준 방향
    if(player){
      const sp = worldToScreen(player.x, player.y);
      const ax = mx - sp.x, ay = my - sp.y, am = Math.hypot(ax,ay)||1;
      input.aim.x = ax/am; input.aim.y = ay/am; input.hasAim=true;
    }
  };
} else {
  document.getElementById('touch').style.display='block';
  setupStick('stickL', v=>{ input.move.x=v.x; input.move.y=v.y; });
  setupStick('stickR', v=>{
      const m=Math.hypot(v.x,v.y);
      if(m>0.12){ input.aim.x=v.x/m; input.aim.y=v.y/m; input.hasAim=true; input.firing=true; }
    }, ()=>{ input.firing=false; }, true);
  const sb=document.getElementById('superBtn');
  const sbStart = e=>{ e.preventDefault(); input.superReq=true; };
  sb.addEventListener('touchstart', sbStart, {passive:false});
  sb.addEventListener('mousedown', sbStart);
  window.__readPC = ()=>{};
}

function setupStick(id, onMove, onEnd, autoFire){
  const el = document.getElementById(id);
  const knob = el.querySelector('.knob');
  let touchId=null, cx=0, cy=0;
  const R=52;
  const pos = e=>{ const t=[...(e.touches||[e])].find(t=>t.identifier===touchId)||e; return {x:t.clientX,y:t.clientY}; };
  const start = e=>{
    e.preventDefault();
    const t=(e.touches?e.touches[e.touches.length-1]:e);
    touchId = e.touches? t.identifier : 'mouse';
    const r=el.getBoundingClientRect(); cx=r.left+r.width/2; cy=r.top+r.height/2;
    move(e);
  };
  const move = e=>{
    if(touchId===null) return;
    e.preventDefault();
    const p=pos(e); let dx=p.x-cx, dy=p.y-cy; const d=Math.hypot(dx,dy);
    if(d>R){ dx=dx/d*R; dy=dy/d*R; }
    knob.style.transform=`translate(${dx}px,${dy}px)`;
    onMove({x:dx/R, y:dy/R});
  };
  const end = e=>{ touchId=null; knob.style.transform='translate(0,0)';
    onMove({x:0,y:0}); if(onEnd)onEnd(); };
  el.addEventListener('touchstart',start,{passive:false});
  el.addEventListener('touchmove',move,{passive:false});
  el.addEventListener('touchend',end); el.addEventListener('touchcancel',end);
  // 데스크탑 마우스 폴백(테스트 편의)
  el.addEventListener('mousedown',start);
  addEventListener('mousemove',e=>{ if(touchId==='mouse')move(e); });
  addEventListener('mouseup',e=>{ if(touchId==='mouse')end(e); });
}

/* ----------------------------------------------------------------
   4. WORLD: 장애물 & 부쉬 생성
   ---------------------------------------------------------------- */
let walls=[], bushes=[];
function buildArena(){
  walls=[]; bushes=[];
  // 외벽 안쪽 대칭 배치
  const W=WORLD.w, H=WORLD.h;
  const blocks=[
    [W*0.5-40,H*0.5-40,80,80],
    [W*0.22,H*0.22,120,40],[W*0.78-120,H*0.22,120,40],
    [W*0.22,H*0.78-40,120,40],[W*0.78-120,H*0.78-40,120,40],
    [W*0.5-20,H*0.16,40,150],[W*0.5-20,H*0.84-150,40,150],
    [W*0.12,H*0.5-60,40,120],[W*0.88-40,H*0.5-60,40,120],
  ];
  blocks.forEach(b=>walls.push({x:b[0],y:b[1],w:b[2],h:b[3]}));
  const bsh=[
    [W*0.32,H*0.4],[W*0.68,H*0.4],[W*0.32,H*0.6],[W*0.68,H*0.6],
    [W*0.5,H*0.3],[W*0.5,H*0.7],[W*0.15,H*0.85],[W*0.85,H*0.15],
    [W*0.15,H*0.15],[W*0.85,H*0.85],
  ];
  bsh.forEach(p=>bushes.push({x:p[0],y:p[1],r:95}));
}
function inBush(x,y){ return bushes.some(b=>Math.hypot(x-b.x,y-b.y)<b.r); }

/* circle vs walls — 충돌 후 보정된 위치 반환 */
function moveWithWalls(e, nx, ny){
  // X축
  let cx=nx;
  for(const w of walls){
    if(circleRect(cx,e.y,e.radius,w)){
      cx = (e.x < w.x) ? w.x - e.radius - 0.01 : w.x + w.w + e.radius + 0.01;
    }
  }
  // Y축
  let cy=ny;
  for(const w of walls){
    if(circleRect(cx,cy,e.radius,w)){
      cy = (e.y < w.y) ? w.y - e.radius - 0.01 : w.y + w.h + e.radius + 0.01;
    }
  }
  e.x = clamp(cx, e.radius, WORLD.w-e.radius);
  e.y = clamp(cy, e.radius, WORLD.h-e.radius);
}
function circleRect(cx,cy,r,w){
  const nx=clamp(cx,w.x,w.x+w.w), ny=clamp(cy,w.y,w.y+w.h);
  return Math.hypot(cx-nx,cy-ny) < r;
}
function lineBlocked(x1,y1,x2,y2){ // 시야 차단(벽) 간단 체크
  const steps=Math.ceil(Math.hypot(x2-x1,y2-y1)/22);
  for(let i=1;i<steps;i++){ const t=i/steps, x=x1+(x2-x1)*t, y=y1+(y2-y1)*t;
    if(walls.some(w=>x>=w.x&&x<=w.x+w.w&&y>=w.y&&y<=w.y+w.h)) return true; }
  return false;
}
const clamp=(v,a,b)=>v<a?a:v>b?b:v;

/* ----------------------------------------------------------------
   5. ENTITIES
   ---------------------------------------------------------------- */
let player=null, entities=[], projectiles=[], particles=[], floaters=[];
let running=false, lastT=0, gameOver=false;

// ===== 게임 모드 정의 (브롤스타즈에 없는 신규 방식) =====
const MODES = {
  showdown:{ label:"배틀로얄", icon:"\u{1F4A5}", players:1, bots:3, respawn:false, score:false,
    desc:"마지막 1인 생존. 부활 없음." },
  duel:{ label:"코어 듀얼 (1:1)", icon:"\u2694\uFE0F", players:1, bots:1, respawn:true, score:true, target:3, zone:true,
    desc:"<b>1:1 전용.</b> 부활전 + 중앙 코어존. 적 격추 1점, 중앙 코어존을 5초 점령하면 보너스 1점. 먼저 3점!" },
  link:{ label:"링크 아레나 (2:2)", icon:"\u{1F517}", players:1, bots:3, allies:1, respawn:true, score:true, target:7, link:true,
    desc:"<b>2:2 전용.</b> 팀원과 가까이 붙으면 둘 사이에 <b>전류 링크</b>가 생겨 닿는 적에게 지속 피해! 뭉치면 강하지만 광역에 취약. 팀 7점 먼저!" },
};
const LINK_RANGE=320, LINK_DMG=1100, ZONE_R=130, ZONE_GOAL=5;
let mode=MODES.showdown, teamScore=[0,0], zoneHold=[0,0], zone=null;
const TEAM_COLOR=["#ffd23f","#ff5c8a"];
const enemyOf=(a,b)=>a.team!==b.team;

function makeEntity(cfg, x, y, isPlayer, isBot, name, team){
  return {
    cfg, x, y, vx:0, vy:0, radius:cfg.radius, color:cfg.color, name,
    hp:cfg.hp, maxHp:cfg.hp, ammo:cfg.ammo, maxAmmo:cfg.ammo, reloadT:0,
    fireCd:0, aim:{x:1,y:0}, alive:true, isPlayer, isBot,
    team:team||0, spawn:{x,y}, respawnT:0,
    superCharge:0, superMax:cfg.super.charge, shield:0, shieldT:0,
    aiState:{t:0, strafe:1, retarget:0, targetId:null}, flash:0, recoil:0
  };
}

function startMatch(charId, modeKey){
  buildArena();
  entities=[]; projectiles=[]; particles=[]; floaters=[]; gameOver=false;
  teamScore=[0,0]; zoneHold=[0,0];
  mode = MODES[modeKey] || MODES.showdown;
  zone = mode.zone ? {x:WORLD.w*0.5, y:WORLD.h*0.5, r:ZONE_R} : null;
  const cfg = byId(charId);
  const W=WORLD.w, H=WORLD.h;
  const pool = CHARACTERS.filter(c=>c.id!==charId);
  const pick = ()=> pool[(Math.random()*pool.length)|0];

  if(mode===MODES.showdown){
    player = makeEntity(cfg, W*0.5, H*0.85, true, false, "YOU", 0);
    entities.push(player);
    const sp=[[W*0.15,H*0.15],[W*0.85,H*0.15],[W*0.5,H*0.12]];
    for(let i=0;i<3;i++) entities.push(makeEntity(pick(), sp[i][0],sp[i][1], false,true,"BOT "+(i+1), i+1));
  } else if(mode===MODES.duel){
    player = makeEntity(cfg, W*0.5, H*0.82, true, false, "YOU", 0);
    entities.push(player);
    entities.push(makeEntity(pick(), W*0.5, H*0.18, false,true,"RIVAL", 1));
  } else if(mode===MODES.link){
    player = makeEntity(cfg, W*0.34, H*0.82, true, false, "YOU", 0);
    entities.push(player);
    entities.push(makeEntity(pick(), W*0.66, H*0.82, false,true,"ALLY", 0));
    entities.push(makeEntity(pick(), W*0.34, H*0.18, false,true,"FOE 1", 1));
    entities.push(makeEntity(pick(), W*0.66, H*0.18, false,true,"FOE 2", 1));
  }

  cam.x=player.x; cam.y=player.y;
  Net.onMatchStart(charId);
  running=true; lastT=performance.now();
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('charBadge').textContent = mode.icon+" "+mode.label;
  document.getElementById('hintPill').textContent =
    mode===MODES.duel ? "코어존을 점령하거나 라이벌을 3회 격추!" :
    mode===MODES.link ? "팀원과 붙어 전류 링크로 적을 지져라! 팀 7점!" :
    (IS_TOUCH ? "마지막까지 생존하세요!" : "WASD 이동 · 마우스 조준/클릭 · Q 슈퍼");
  updateScoreboard();
  requestAnimationFrame(loop);
}
function updateScoreboard(){
  const b=document.getElementById('scoreBadge'); if(!b) return;
  if(mode.score){ b.innerHTML = '<span style="color:'+TEAM_COLOR[0]+'">나 <b style="color:'+TEAM_COLOR[0]+'">'+teamScore[0]+'</b></span> : <b style="color:'+TEAM_COLOR[1]+'">'+teamScore[1]+'</b> 적 <span style="font-size:11px;color:var(--muted)">/'+mode.target+'</span>'; }
  else { b.innerHTML = '생존 <b>'+entities.filter(e=>e.alive).length+'</b>'; }
}
function checkTeamWin(){ if(gameOver)return;
  if(teamScore[0]>=mode.target) endMatch(true);
  else if(teamScore[1]>=mode.target) endMatch(false); }
function respawnEntity(e){ e.alive=true; e.hp=e.maxHp; e.ammo=e.maxAmmo; e.shield=0; e.shieldT=0; e.superCharge=0;
  e.x=e.spawn.x; e.y=e.spawn.y; e.flash=0; e.respawnT=0; e.aiState.targetId=null;
  for(let i=0;i<14;i++) particles.push(spark(e.x,e.y,e.color));
  rings.push({x:e.x,y:e.y,r:6,maxR:e.radius+44,life:0.4,max:0.4,color:e.color,width:4}); }
function distToSeg(px,py,ax,ay,bx,by){ const dx=bx-ax,dy=by-ay; const L=dx*dx+dy*dy||1;
  let t=((px-ax)*dx+(py-ay)*dy)/L; t=clamp(t,0,1);
  return Math.hypot(px-(ax+dx*t), py-(ay+dy*t)); }
let activeLinks=[];
function updateZone(dt){ if(!zone) return;
  const present=[false,false];
  entities.forEach(e=>{ if(e.alive && Math.hypot(e.x-zone.x,e.y-zone.y)<zone.r) present[e.team]=true; });
  let h=-1; if(present[0]&&!present[1])h=0; else if(present[1]&&!present[0])h=1;
  if(h>=0){ zoneHold[h]+=dt; zoneHold[1-h]=0;
    if(zoneHold[h]>=ZONE_GOAL){ teamScore[h]++; zoneHold=[0,0];
      float(zone.x,zone.y,"코어 점령 +1",TEAM_COLOR[h],1.5); screenFlash=0.2;
      rings.push({x:zone.x,y:zone.y,r:10,maxR:zone.r*1.7,life:0.6,max:0.6,color:TEAM_COLOR[h],width:8});
      checkTeamWin(); } }
  else { zoneHold=[0,0]; } }
function updateLink(dt){ activeLinks=[]; if(!mode.link) return;
  for(let tm=0;tm<2;tm++){ const mem=entities.filter(e=>e.alive && e.team===tm);
    if(mem.length<2) continue; const a=mem[0], b=mem[1];
    if(Math.hypot(a.x-b.x,a.y-b.y)>LINK_RANGE) continue;
    activeLinks.push([a,b]);
    entities.forEach(en=>{ if(en.alive && en.team!==tm && distToSeg(en.x,en.y,a.x,a.y,b.x,b.y)<en.radius+10){
      const src=(Math.hypot(en.x-a.x,en.y-a.y)<Math.hypot(en.x-b.x,en.y-b.y))?a:b;
      damage(en, LINK_DMG*dt, src, true);
      if(Math.random()<0.25) particles.push(spark(en.x,en.y,"#9be8ff")); } });
  } }

/* ----------------------------------------------------------------
   6. FIRING
   ---------------------------------------------------------------- */
function tryFire(e){
  if(e.ammo<1 || e.fireCd>0 || !e.alive) return;
  const a=e.cfg.attack;
  e.ammo--; e.fireCd = a.type==='rapid'?0.12 : (a.type==='sniper'?0.5:0.28);
  spawnAttack(e, a, false);
  if(e.isPlayer) Net.onFire(e, a); // Phase 3 훅
}
function spawnAttack(e, a, isSuper){
  const baseAng = Math.atan2(e.aim.y, e.aim.x);
  const n = a.count||1;
  for(let i=0;i<n;i++){
    const off = n>1 ? (i/(n-1)-0.5)*(a.spread||0) : (Math.random()-0.5)*(a.spread||0);
    const ang = baseAng+off;
    projectiles.push({
      x:e.x+Math.cos(ang)*e.radius, y:e.y+Math.sin(ang)*e.radius,
      vx:Math.cos(ang)*a.projSpeed, vy:Math.sin(ang)*a.projSpeed,
      ang, speed:a.projSpeed, r:a.projRadius, dmg:a.damage,
      range:a.range, traveled:0, owner:e, color:e.color,
      type:a.type, aoe:a.aoe||0, pierce:!!a.pierce, homing:!!a.homing,
      turn:a.turn||0, isSuper, hitSet:new Set(), trail:[]
    });
  }
  const mAng=baseAng;
  flashes.push({x:e.x+Math.cos(mAng)*e.radius, y:e.y+Math.sin(mAng)*e.radius, ang:mAng,
    life:isSuper?0.12:0.07, max:isSuper?0.12:0.07, color:e.color, size:isSuper?26:16});
  e.recoil = isSuper?9:5;
  for(let i=0;i<4;i++) particles.push(spark(e.x,e.y,e.color));
}
function activateSuper(e){
  if(e.superCharge < e.superMax || !e.alive) return;
  e.superCharge=0;
  const s=e.cfg.super;
  cam.zoomPunch=0.1; shake=Math.min(16,shake+8);
  rings.push({x:e.x,y:e.y,r:e.radius,maxR:e.radius+90,life:0.4,max:0.4,color:e.color,width:6});
  if(s.type==='burst'){
    spawnAttack(e, {type:s.homing?'homing':'single', damage:s.damage, count:s.count,
      spread:s.spread, projSpeed:s.projSpeed, range:s.range, projRadius:9,
      pierce:s.pierce, homing:s.homing, turn:s.turn}, true);
  } else if(s.type==='dash'){
    const ang=Math.atan2(e.aim.y,e.aim.x);
    const tx=e.x+Math.cos(ang)*s.distance, ty=e.y+Math.sin(ang)*s.distance;
    moveWithWalls(e, tx, ty);
    splashDamage(e, e.x, e.y, 110, s.damage);
    for(let i=0;i<16;i++) particles.push(spark(e.x,e.y,e.color));
  } else if(s.type==='heal'){
    e.hp=Math.min(e.maxHp, e.hp+s.value); float(e.x,e.y,"+"+s.value,"#3ddc97");
  } else if(s.type==='shield'){
    e.shield=s.value; e.shieldT=s.duration; float(e.x,e.y,"SHIELD","#748ffc");
  } else if(s.type==='nova'){
    splashDamage(e, e.x, e.y, s.radius, s.damage);
    rings.push({x:e.x,y:e.y,r:10,maxR:s.radius,life:0.5,max:0.5,color:"#ff8787",width:10});
    screenFlash=0.25;
    for(let i=0;i<28;i++){const p=spark(e.x,e.y,"#ff8787");p.life=0.6;particles.push(p);}
  }
  if(e.isPlayer) Net.onSuper(e); // Phase 3 훅
}
function splashDamage(src,x,y,radius,dmg){
  entities.forEach(t=>{ if(t!==src && t.alive && enemyOf(t,src) && Math.hypot(t.x-x,t.y-y)<radius+t.radius)
    damage(t, dmg, src); });
}

/* ----------------------------------------------------------------
   7. DAMAGE / DEATH
   ---------------------------------------------------------------- */
function damage(t, dmg, src, silent){
  if(!t.alive) return;
  if(t.shield>0){ const ab=Math.min(t.shield,dmg); t.shield-=ab; dmg-=ab; }
  if(dmg<=0){ t.flash=0.1; return; }
  t.hp-=dmg; t.flash=0.12;
  if(!silent){ const big = dmg>=800;
    float(t.x,t.y,"-"+Math.round(dmg), t.isPlayer?"#ff6b6b":(big?"#ffd23f":"#fff"), big?1.5:1);
    rings.push({x:t.x,y:t.y,r:t.radius,maxR:t.radius+(big?34:20),life:0.25,max:0.25,color:big?"#ffd23f":"#fff",width:big?5:3});
    if(t.isPlayer){ shake=Math.min(16,shake+5); } }
  if(src){ src.superCharge=Math.min(src.superMax, src.superCharge+dmg*0.55); }
  if(t.hp<=0){ t.alive=false;
    screenFlash=Math.max(screenFlash, t.isPlayer?0.5:0.3); shake=Math.min(16,shake+10);
    rings.push({x:t.x,y:t.y,r:t.radius,maxR:t.radius+130,life:0.5,max:0.5,color:t.color,width:8});
    rings.push({x:t.x,y:t.y,r:t.radius,maxR:t.radius+80,life:0.4,max:0.4,color:"#fff",width:4});
    for(let i=0;i<36;i++) particles.push(spark(t.x,t.y,t.color,true));
    if(mode.respawn){
      if(src && enemyOf(src,t)){ teamScore[src.team]++; float(t.x,t.y,"격추 +1",TEAM_COLOR[src.team],1.4); }
      t.respawnT = 2.0; updateScoreboard(); checkTeamWin();
    } else { checkWin(); }
  }
}
function checkWin(){
  const alive = entities.filter(e=>e.alive);
  updateScoreboard();
  if(gameOver) return;
  if(!player.alive){ endMatch(false); }
  else if(alive.length===1 && alive[0]===player){ endMatch(true); }
}
function endMatch(win){
  gameOver=true; running=false;
  setTimeout(()=>{
    document.getElementById('hud').classList.add('hidden');
    const r=document.getElementById('result');
    const rt=document.getElementById('resultText');
    rt.textContent = win?"VICTORY":"DEFEAT";
    rt.className = "resultTitle "+(win?"win":"lose");
    document.getElementById('resultSub').textContent =
      mode.score ? (win ? ("팀 승리! "+teamScore[0]+" : "+teamScore[1]+" 🏆") : ("팀 패배… "+teamScore[0]+" : "+teamScore[1]))
                 : (win ? "최후의 1인! 모든 봇을 처치했습니다 🏆" : "쓰러졌습니다. 다시 도전해보세요!");
    r.classList.remove('hidden');
    Net.onMatchEnd(win); // Phase 3 훅
  }, 900);
}

/* ----------------------------------------------------------------
   8. BOT AI  (연습 모드 더미)
   ---------------------------------------------------------------- */
function updateBot(b, dt){
  const ai=b.aiState; ai.t+=dt; ai.retarget-=dt;
  // 타깃 선정: 가장 가까운 적
  if(ai.retarget<=0 || !aliveEntity(ai.targetId)){
    let best=null,bd=1e9;
    entities.forEach(e=>{ if(enemyOf(e,b) && e.alive){
      const d=Math.hypot(e.x-b.x,e.y-b.y);
      const hidden = inBush(e.x,e.y) && d>180; // 부쉬 은신
      if(!hidden && d<bd){bd=d;best=e;} } });
    ai.targetId = best?entities.indexOf(best):null;
    ai.retarget = 0.4;
    if(Math.random()<0.5) ai.strafe*=-1;
  }
  const tgt = ai.targetId!=null?entities[ai.targetId]:null;
  let mx=0,my=0;
  if(tgt && tgt.alive){
    const dx=tgt.x-b.x, dy=tgt.y-b.y, d=Math.hypot(dx,dy)||1;
    b.aim.x=dx/d; b.aim.y=dy/d;
    const pref=b.cfg.attack.range*0.7;
    if(d>pref){ mx=dx/d; my=dy/d; }            // 접근
    else if(d<pref*0.55){ mx=-dx/d; my=-dy/d; } // 카이팅
    // 스트레이프
    mx += -dy/d*ai.strafe*0.6; my += dx/d*ai.strafe*0.6;
    // 발사 조건: 사거리 + 시야
    if(d < b.cfg.attack.range && !lineBlocked(b.x,b.y,tgt.x,tgt.y)) tryFire(b);
    // 슈퍼
    if(b.superCharge>=b.superMax && d<b.cfg.attack.range*0.9 && Math.random()<0.02) activateSuper(b);
  } else {
    // 배회
    mx=Math.cos(ai.t*0.7); my=Math.sin(ai.t*0.5);
  }
  // 링크 모드: 팀원과 붙어 전류 링크 유지하도록 유도
  if(mode.link){ const mate=entities.find(e=>e.alive && e.team===b.team && e!==b);
    if(mate){ const dx=mate.x-b.x, dy=mate.y-b.y, dd=Math.hypot(dx,dy);
      if(dd>LINK_RANGE*0.7){ mx+=dx/dd*0.7; my+=dy/dd*0.7; } } }
  const m=Math.hypot(mx,my)||1;
  applyMove(b, mx/m, my/m, dt);
}
const aliveEntity = id => id!=null && entities[id] && entities[id].alive;

/* ----------------------------------------------------------------
   9. MOVEMENT / AMMO
   ---------------------------------------------------------------- */
function applyMove(e, dx, dy, dt){
  const sp=e.cfg.speed;
  moveWithWalls(e, e.x+dx*sp*dt, e.y+dy*sp*dt);
}
function updateAmmo(e, dt){
  if(e.fireCd>0) e.fireCd-=dt;
  if(e.ammo<e.maxAmmo){ e.reloadT+=dt;
    if(e.reloadT>=e.cfg.reload){ e.reloadT=0; e.ammo++; } }
  if(e.shieldT>0){ e.shieldT-=dt; if(e.shieldT<=0) e.shield=0; }
  if(e.flash>0) e.flash-=dt;
}

/* ----------------------------------------------------------------
   10. PROJECTILES
   ---------------------------------------------------------------- */
function updateProjectiles(dt){
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    if(p.homing){
      let best=null,bd=1e9;
      entities.forEach(e=>{ if(e!==p.owner&&e.alive&&enemyOf(e,p.owner)){const d=Math.hypot(e.x-p.x,e.y-p.y);if(d<bd){bd=d;best=e;}}});
      if(best){ const desired=Math.atan2(best.y-p.y,best.x-p.x);
        let da=((desired-p.ang+Math.PI*3)%(Math.PI*2))-Math.PI;
        p.ang += clamp(da, -p.turn*dt, p.turn*dt);
        p.vx=Math.cos(p.ang)*p.speed; p.vy=Math.sin(p.ang)*p.speed; }
    }
    const stepX=p.vx*dt, stepY=p.vy*dt;
    p.x+=stepX; p.y+=stepY; p.traveled+=Math.hypot(stepX,stepY);
    p.trail.push({x:p.x,y:p.y}); if(p.trail.length>7) p.trail.shift();
    // 월드/벽 충돌
    if(p.x<0||p.y<0||p.x>WORLD.w||p.y>WORLD.h || walls.some(w=>p.x>=w.x&&p.x<=w.x+w.w&&p.y>=w.y&&p.y<=w.y+w.h)){
      if(p.aoe) splashDamage(p.owner,p.x,p.y,p.aoe,p.dmg);
      explode(p); projectiles.splice(i,1); continue;
    }
    // 엔티티 충돌
    let hit=false;
    for(const e of entities){
      if(e===p.owner||!e.alive||p.hitSet.has(e)||!enemyOf(e,p.owner)) continue;
      if(Math.hypot(e.x-p.x,e.y-p.y) < e.radius+p.r){
        if(p.aoe){ splashDamage(p.owner,p.x,p.y,p.aoe,p.dmg); explode(p); }
        else { damage(e,p.dmg,p.owner); }
        p.hitSet.add(e);
        if(!p.pierce){ hit=true; break; }
      }
    }
    if(hit){ projectiles.splice(i,1); continue; }
    if(p.traveled>=p.range){ if(p.aoe) splashDamage(p.owner,p.x,p.y,p.aoe,p.dmg); explode(p); projectiles.splice(i,1); }
  }
}
function explode(p){ if(p.aoe){ for(let i=0;i<12;i++){const s=spark(p.x,p.y,p.color);s.life=0.4;particles.push(s);} } }

/* ----------------------------------------------------------------
   11. FX
   ---------------------------------------------------------------- */
function spark(x,y,color,big){ const a=Math.random()*Math.PI*2,s=(big?180:90)*(0.4+Math.random());
  return {x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.3+Math.random()*0.2,max:0.5,color,r:(big?4:2)+Math.random()*2}; }
function updateParticles(dt){ for(let i=particles.length-1;i>=0;i--){const p=particles[i];
  p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.9;p.vy*=0.9;p.life-=dt; if(p.life<=0)particles.splice(i,1);} }
function float(x,y,txt,color,scale=1){ floaters.push({x,y,txt,color,life:0.9,scale}); }
function updateFloaters(dt){ for(let i=floaters.length-1;i>=0;i--){const f=floaters[i];f.y-=34*dt;f.life-=dt;if(f.life<=0)floaters.splice(i,1);} }
function updateFX(dt){
  for(let i=rings.length-1;i>=0;i--){const r=rings[i];r.life-=dt;const k=1-Math.max(0,r.life/r.max);
    r.r=r.r+(r.maxR-r.r)*Math.min(1,k*0.5+0.04); if(r.life<=0)rings.splice(i,1);}
  for(let i=flashes.length-1;i>=0;i--){flashes[i].life-=dt; if(flashes[i].life<=0)flashes.splice(i,1);}
  entities.forEach(e=>{ if(e.recoil>0) e.recoil=Math.max(0,e.recoil-40*dt); });
  cam.zoomPunch*=Math.pow(0.0005,dt); if(cam.zoomPunch<0.002)cam.zoomPunch=0;
  screenFlash=Math.max(0,screenFlash-dt*2.2);
  shake*=Math.pow(0.001,dt);
}

/* ----------------------------------------------------------------
   12. CAMERA / RENDER
   ---------------------------------------------------------------- */
function worldToScreen(wx,wy){ return { x:(wx-cam.x)*cam.zoom+VW/2, y:(wy-cam.y)*cam.zoom+VH/2 }; }
function render(){
  ctx.save(); ctx.scale(DPR,DPR);
  ctx.clearRect(0,0,VW,VH);
  // 배경
  ctx.fillStyle="#0a1521"; ctx.fillRect(0,0,VW,VH);
  ctx.save();
  ctx.translate(VW/2+cam.sx,VH/2+cam.sy); ctx.scale(cam.zoom,cam.zoom); ctx.translate(-cam.x,-cam.y);

  // 바닥 그리드
  ctx.fillStyle="#13283c"; ctx.fillRect(0,0,WORLD.w,WORLD.h);
  ctx.strokeStyle="rgba(255,255,255,.04)"; ctx.lineWidth=2;
  for(let x=0;x<=WORLD.w;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,WORLD.h);ctx.stroke();}
  for(let y=0;y<=WORLD.h;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(WORLD.w,y);ctx.stroke();}
  // 외곽
  ctx.strokeStyle="#2a4660"; ctx.lineWidth=10; ctx.strokeRect(0,0,WORLD.w,WORLD.h);

  // 부쉬
  bushes.forEach(b=>{ ctx.fillStyle="rgba(45,140,80,.55)";
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fill();
    ctx.fillStyle="rgba(60,180,100,.35)";
    ctx.beginPath();ctx.arc(b.x,b.y,b.r*0.7,0,7);ctx.fill(); });

  // 벽
  walls.forEach(w=>{ ctx.fillStyle="#33536f";
    roundRect(w.x,w.y,w.w,w.h,6); ctx.fill();
    ctx.fillStyle="rgba(0,0,0,.25)"; ctx.fillRect(w.x,w.y+w.h-6,w.w,6); });

  // 코어존(듀얼)
  if(zone){
    let h=-1; if(zoneHold[0]>0)h=0; else if(zoneHold[1]>0)h=1;
    const prog = h>=0 ? zoneHold[h]/ZONE_GOAL : 0;
    ctx.save();
    ctx.fillStyle = h>=0 ? TEAM_COLOR[h]+"22" : "rgba(255,255,255,.05)";
    ctx.beginPath();ctx.arc(zone.x,zone.y,zone.r,0,7);ctx.fill();
    ctx.lineWidth=4; ctx.strokeStyle = h>=0?TEAM_COLOR[h]:"rgba(255,255,255,.3)";
    ctx.beginPath();ctx.arc(zone.x,zone.y,zone.r,0,7);ctx.stroke();
    if(prog>0){ ctx.lineWidth=7; ctx.strokeStyle=TEAM_COLOR[h];
      ctx.beginPath();ctx.arc(zone.x,zone.y,zone.r-6,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);ctx.stroke(); }
    ctx.fillStyle="rgba(255,255,255,.5)"; ctx.font="bold 18px Bungee,sans-serif"; ctx.textAlign="center";
    ctx.fillText("CORE",zone.x,zone.y+6); ctx.restore();
  }

  // 투사체 트레일 + 글로우(가산합성)
  ctx.save(); ctx.globalCompositeOperation="lighter";
  projectiles.forEach(p=>{
    for(let i=0;i<p.trail.length;i++){const tp=p.trail[i];const a=(i+1)/p.trail.length;
      ctx.globalAlpha=a*0.4; ctx.fillStyle=p.isSuper?"#fff":p.color;
      ctx.beginPath();ctx.arc(tp.x,tp.y,p.r*a*(p.isSuper?1.6:1),0,7);ctx.fill();}
    ctx.globalAlpha=1; ctx.fillStyle=p.isSuper?"#fff":p.color; ctx.shadowColor=p.color; ctx.shadowBlur=16;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*(p.isSuper?1.6:1),0,7);ctx.fill(); ctx.shadowBlur=0; });
  ctx.restore(); ctx.globalAlpha=1;

  // 엔티티
  entities.forEach(e=>{ if(!e.alive)return;
    const hidden = enemyOf(e,player) && inBush(e.x,e.y) && player.alive && Math.hypot(e.x-player.x,e.y-player.y)>180;
    drawEntity(e, hidden);
  });

  // 파티클
  particles.forEach(p=>{ ctx.globalAlpha=Math.max(0,p.life/p.max);
    ctx.fillStyle=p.color; ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill(); });
  ctx.globalAlpha=1;

  // 전류 링크 빔(2:2)
  if(activeLinks.length){ ctx.save(); ctx.globalCompositeOperation="lighter";
    const pulse=0.6+0.4*Math.sin(performance.now()/90);
    activeLinks.forEach(([a,b])=>{ const col=TEAM_COLOR[a.team];
      ctx.strokeStyle=col; ctx.globalAlpha=0.25*pulse; ctx.lineWidth=14;
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
      ctx.globalAlpha=0.9; ctx.lineWidth=4; ctx.strokeStyle="#cffaff";
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
      // 스파크 노드
      ctx.fillStyle=col; [a,b].forEach(n=>{ctx.beginPath();ctx.arc(n.x,n.y,8*pulse,0,7);ctx.fill();}); });
    ctx.restore(); ctx.globalAlpha=1; }

  // 충격파 링 + 머즐 플래시(가산합성)
  ctx.save(); ctx.globalCompositeOperation="lighter";
  rings.forEach(r=>{ const a=Math.max(0,r.life/r.max); ctx.globalAlpha=a;
    ctx.strokeStyle=r.color; ctx.lineWidth=r.width*a; ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,7);ctx.stroke(); });
  flashes.forEach(f=>{ const a=Math.max(0,f.life/f.max); ctx.globalAlpha=a;
    ctx.save(); ctx.translate(f.x,f.y); ctx.rotate(f.ang);
    ctx.fillStyle="#fff"; ctx.beginPath();ctx.arc(0,0,f.size*0.45*a+3,0,7);ctx.fill();
    ctx.fillStyle=f.color; ctx.beginPath();
    ctx.moveTo(0,0);ctx.lineTo(f.size*a,-f.size*0.32*a);ctx.lineTo(f.size*1.4*a,0);ctx.lineTo(f.size*a,f.size*0.32*a);
    ctx.closePath();ctx.fill(); ctx.restore(); });
  ctx.restore(); ctx.globalAlpha=1;

  // 데미지 숫자
  floaters.forEach(f=>{ ctx.globalAlpha=Math.max(0,f.life/0.9);
    const fs=Math.round(20*(f.scale||1)); ctx.font="bold "+fs+"px Jua, sans-serif"; ctx.fillStyle=f.color; ctx.textAlign="center";
    ctx.lineWidth=4; ctx.strokeStyle="rgba(0,0,0,.6)";
    ctx.strokeText(f.txt,f.x,f.y); ctx.fillText(f.txt,f.x,f.y); });
  ctx.globalAlpha=1;

  ctx.restore();
  if(screenFlash>0.01){ ctx.save(); ctx.globalCompositeOperation="lighter";
    ctx.fillStyle="rgba(255,255,255,"+screenFlash+")"; ctx.fillRect(0,0,VW,VH); ctx.restore(); }
  drawMinimap();
  ctx.restore();
}
function drawEntity(e, hidden){
  ctx.save();
  const rb = e.recoil>0?e.recoil:0;
  ctx.translate(e.x - e.aim.x*rb, e.y - e.aim.y*rb);
  ctx.globalAlpha = hidden?0.25:1;
  // 그림자
  ctx.fillStyle="rgba(0,0,0,.3)"; ctx.beginPath();ctx.ellipse(0,e.radius*0.6,e.radius*0.9,e.radius*0.4,0,0,7);ctx.fill();
  // 조준 방향
  if(!hidden){ ctx.strokeStyle="rgba(255,255,255,.25)"; ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(e.aim.x*e.radius*1.6,e.aim.y*e.radius*1.6);ctx.stroke(); }
  // 본체
  ctx.fillStyle = e.flash>0?"#fff":e.color;
  ctx.beginPath();ctx.arc(0,0,e.radius,0,7);ctx.fill();
  const ally = (e.team===player.team);
  ctx.strokeStyle = e.isPlayer?"#ffd23f":(ally?"#3ddc97":"#ff5c8a"); ctx.lineWidth = e.isPlayer?4:3;
  ctx.beginPath();ctx.arc(0,0,e.radius,0,7);ctx.stroke();
  // 보호막
  if(e.shield>0){ ctx.strokeStyle="rgba(116,143,252,.9)";ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(0,0,e.radius+6,0,7);ctx.stroke(); }
  ctx.restore();

  if(hidden) return;
  // 체력바 + 이름
  const w=e.radius*2.4, h=7, bx=e.x-w/2, by=e.y-e.radius-20;
  ctx.fillStyle="rgba(0,0,0,.55)"; roundRect(bx-2,by-2,w+4,h+4,4); ctx.fill();
  ctx.fillStyle="#2b2b2b"; roundRect(bx,by,w,h,3); ctx.fill();
  ctx.fillStyle = (e.team===player.team)?"#3ddc97":"#ff6b6b";
  roundRect(bx,by,w*Math.max(0,e.hp/e.maxHp),h,3); ctx.fill();
  if(e.shield>0){ ctx.fillStyle="#748ffc"; roundRect(bx,by-5,w*Math.min(1,e.shield/e.maxHp),3,2); ctx.fill(); }
  // 탄약 점
  for(let i=0;i<e.maxAmmo;i++){ ctx.fillStyle=i<e.ammo?"#ffd23f":"#3a3a3a";
    ctx.beginPath();ctx.arc(bx+6+i*10, by+h+8, 3,0,7);ctx.fill(); }
  // 슈퍼 게이지(플레이어)
  if(e.isPlayer){ const sc=e.superCharge/e.superMax;
    ctx.fillStyle="rgba(0,0,0,.5)";roundRect(bx,by+h+14,w,4,2);ctx.fill();
    ctx.fillStyle = sc>=1?"#ffd23f":"#ff8c42"; roundRect(bx,by+h+14,w*Math.min(1,sc),4,2);ctx.fill(); }
  ctx.font="bold 12px Jua, sans-serif"; ctx.textAlign="center"; ctx.fillStyle="#fff";
  ctx.lineWidth=3; ctx.strokeStyle="rgba(0,0,0,.6)";
  ctx.strokeText(e.name,e.x,by-8); ctx.fillText(e.name,e.x,by-8);
}
function drawMinimap(){
  const s=0.07, mw=WORLD.w*s, mh=WORLD.h*s, mx=12, my=VH-mh-12;
  ctx.save(); ctx.globalAlpha=0.82;
  ctx.fillStyle="#0a1521"; roundRect(mx-4,my-4,mw+8,mh+8,6); ctx.fill();
  ctx.strokeStyle="#2a4660";ctx.lineWidth=1;ctx.strokeRect(mx,my,mw,mh);
  walls.forEach(w=>{ctx.fillStyle="#33536f";ctx.fillRect(mx+w.x*s,my+w.y*s,w.w*s,w.h*s);});
  entities.forEach(e=>{ if(!e.alive)return; ctx.fillStyle=e.isPlayer?"#ffd23f":"#ff6b6b";
    ctx.beginPath();ctx.arc(mx+e.x*s,my+e.y*s,e.isPlayer?4:3,0,7);ctx.fill(); });
  ctx.restore();
}
function roundRect(x,y,w,h,r){ ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath(); }

/* ----------------------------------------------------------------
   13. MAIN LOOP
   ---------------------------------------------------------------- */
function loop(now){
  if(!running) return;
  let dt=(now-lastT)/1000; lastT=now; if(dt>0.05)dt=0.05;
  if(hitstop>0){ hitstop-=dt; dt*=0.25; }
  window.__readPC();

  // 플레이어 업데이트
  if(player.alive){
    applyMove(player, input.move.x, input.move.y, dt);
    if(input.hasAim){ player.aim.x=input.aim.x; player.aim.y=input.aim.y; }
    if(input.firing) tryFire(player);
    if(input.superReq){ activateSuper(player); }
    updateAmmo(player, dt);
    Net.sendState(player); // Phase 3 훅 (위치/조준 동기화 지점)
  }
  input.superReq=false;

  // 봇 업데이트
  entities.forEach(e=>{ if(e.isBot&&e.alive){ updateBot(e,dt); updateAmmo(e,dt); } });

  // 부활(점수 모드)
  if(mode.respawn){ entities.forEach(e=>{ if(!e.alive && e.respawnT>0){ e.respawnT-=dt; if(e.respawnT<=0) respawnEntity(e); } }); }
  updateZone(dt); updateLink(dt);

  updateProjectiles(dt); updateParticles(dt); updateFloaters(dt); updateFX(dt);
  if(mode.score) updateScoreboard();

  // 슈퍼버튼 상태(모바일)
  if(IS_TOUCH){ document.getElementById('superBtn').classList.toggle('ready', player.alive && player.superCharge>=player.superMax); }

  // 카메라
  cam.x += (player.x-cam.x)*Math.min(1,8*dt);
  cam.y += (player.y-cam.y)*Math.min(1,8*dt);
  cam.zoom = cam.zoomBase*(1+cam.zoomPunch);
  cam.sx=(Math.random()-0.5)*shake; cam.sy=(Math.random()-0.5)*shake;

  render();
  requestAnimationFrame(loop);
}

/* ----------------------------------------------------------------
   14. NET STUB  (Phase 3 연동 인터페이스)
   실제 멀티플레이는 이 객체를 PartyKit/Supabase Realtime 어댑터로 교체.
   엔진은 Net.* 만 호출하므로 게임 로직 수정 없이 네트워크 부착 가능.
   ---------------------------------------------------------------- */
const Net = {
  enabled:false,
  onMatchStart(charId){ /* room join, 초기 상태 송신 */ },
  sendState(p){ /* {id,x,y,aim,hp,ammo} broadcast (throttle ~15Hz 권장) */ },
  onFire(e,a){ /* 발사 이벤트 송신 → 원격 spawnAttack 재생 */ },
  onSuper(e){ /* 슈퍼 이벤트 송신 */ },
  onMatchEnd(win){ /* 결과 보고 */ },
  applyRemote(state){ /* 수신 시 원격 엔티티 보간 적용 */ }
};

/* ----------------------------------------------------------------
   15. UI: 메뉴 / 캐릭터 선택
   ---------------------------------------------------------------- */
let selectedChar = CHARACTERS[0].id;
const STAT_KEYS=[["속도","speed",230],["체력","hp",5400],["공격","damage",1700],["사거리","range",960]];
function statVal(c,key){ if(key==="damage")return c.attack.damage; if(key==="range")return c.attack.range; return c[key]; }

function buildSelect(){
  const grid=document.getElementById('charGrid'); grid.innerHTML="";
  CHARACTERS.forEach(c=>{
    const card=document.createElement('div'); card.className="card"+(c.id===selectedChar?" sel":"");
    card.dataset.id=c.id;
    let bars=STAT_KEYS.map(([lbl,key,max])=>{
      const v=Math.min(1,statVal(c,key)/max)*100;
      return `<div class="stat"><b>${lbl}</b><div class="bar"><i style="width:${v}%"></i></div></div>`;
    }).join("");
    card.innerHTML=`<span class="ava" style="background:radial-gradient(circle at 50% 35%,#fff5,${c.color})"></span>
      <div class="nm">${c.name}</div><div class="role">${c.role}</div><div class="stats">${bars}</div>`;
    card.onclick=()=>{ selectedChar=c.id; buildSelect(); showDetail(c); };
    grid.appendChild(card);
  });
  showDetail(byId(selectedChar));
}
function showDetail(c){
  document.getElementById('charDetail').innerHTML=
    `<span class="ava" style="width:48px;height:48px;border-radius:50%;background:radial-gradient(circle at 50% 35%,#fff5,${c.color})"></span>
     <div><div class="big" style="color:${c.color}">${c.name}</div>
     <div class="role" style="font-size:13px">${c.role} · 공격: ${attackLabel(c.attack.type)}</div></div>
     <div class="desc">${c.desc}<br><b style="color:var(--accent)">슈퍼:</b> ${c.super.desc}</div>`;
}
function attackLabel(t){return{single:"단발",spread:"산탄",rapid:"연사",lob:"포물선 폭탄",sniper:"저격 관통",homing:"유도탄"}[t]||t;}

function show(id){ ["menu","select","result"].forEach(x=>document.getElementById(x).classList.add('hidden'));
  if(id)document.getElementById(id).classList.remove('hidden'); }

document.getElementById('ctrlTip').innerHTML = IS_TOUCH
  ? "📱 모바일: 좌측 조이스틱 <b>이동</b>, 우측 조이스틱 <b>조준·발사</b>, 가운데 버튼 <b>슈퍼</b>"
  : "🖥️ PC: <span class='kbd'>W</span><span class='kbd'>A</span><span class='kbd'>S</span><span class='kbd'>D</span> 이동 · 마우스 조준 · <b>클릭</b> 발사 · <span class='kbd'>Q</span>/우클릭 슈퍼";

let selectedMode = "showdown";
function buildModeRow(){
  const row=document.getElementById('modeRow'); row.innerHTML="";
  Object.keys(MODES).forEach(k=>{
    const m=MODES[k]; const btn=document.createElement('button');
    btn.className="btn"+(k===selectedMode?" alt":""); btn.style.cssText="flex:1;min-width:130px;font-size:14px;padding:10px 12px";
    btn.innerHTML=m.icon+" "+m.label;
    btn.onclick=()=>{ selectedMode=k; buildModeRow(); };
    row.appendChild(btn);
  });
  document.getElementById('modeDesc').innerHTML = MODES[selectedMode].desc;
  document.getElementById('startGame').innerHTML = MODES[selectedMode].icon+" "+MODES[selectedMode].label+" 시작";
}
document.getElementById('toSelect').onclick=()=>{ buildSelect(); buildModeRow(); show('select'); };
document.getElementById('backMenu').onclick=()=>show('menu');
document.getElementById('startGame').onclick=()=>{ show(null); startMatch(selectedChar, selectedMode); };
document.getElementById('rematch').onclick=()=>{ show(null); startMatch(selectedChar, selectedMode); };
document.getElementById('changeChar').onclick=()=>{ buildSelect(); buildModeRow(); show('select'); };

// 초기 화면
show('menu');
</script>
