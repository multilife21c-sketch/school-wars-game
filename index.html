<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NEON ANIMALS — 탑다운 액션 슈터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Jua&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1b2a; --bg2:#14263b;
    --ink:#f4f7ff; --muted:#9fb3c8;
    --accent:#ffd23f; --accent2:#ff5c8a; --good:#3ddc97; --bad:#ff4d4d;
    --panel:rgba(13,27,42,.82);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;height:100dvh;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:'Outfit',system-ui,sans-serif;touch-action:none;user-select:none;}
  #app{position:fixed;inset:0;}
  
  /* 메인 캔버스 100% 채우기 */
  #cv{display:block;position:absolute;inset:0;width:100%;height:100%;z-index:1;}

  /* ---- Overlays ---- */
  .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:safe center;
    flex-direction:column;gap:16px;z-index:30;
    padding:max(20px,env(safe-area-inset-top)) max(18px,env(safe-area-inset-right)) max(20px,env(safe-area-inset-bottom)) max(18px,env(safe-area-inset-left));
    overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
    background:radial-gradient(120% 120% at 50% 0%, #1b3a5b 0%, #0a1521 70%);}
  .hidden{display:none!important;}
  .logo{font-family:'Bungee',sans-serif;font-size:clamp(28px,min(9vw,11vh),76px);line-height:.95;
    letter-spacing:2px;text-align:center;
    background:linear-gradient(180deg,#fff,#ffd23f 60%,#ff8c42);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 6px 0 rgba(0,0,0,.25);}
  .logo small{display:block;font-family:'Jua';font-size:clamp(12px,min(3.4vw,4vh),20px);
    letter-spacing:3px;color:var(--muted);-webkit-text-fill-color:var(--muted);margin-top:6px;}
  .tip{color:var(--muted);font-size:14px;max-width:520px;text-align:center;line-height:1.5;}

  .btn{font-family:'Jua';font-size:clamp(16px,min(4.6vw,5.5vh),22px);border:none;cursor:pointer;
    color:#1a1205;padding:14px 30px;border-radius:16px;
    background:linear-gradient(180deg,#ffe071,#ffd23f);
    box-shadow:0 6px 0 #b88a13, 0 10px 22px rgba(0,0,0,.4);
    transition:transform .06s, box-shadow .06s;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #b88a13,0 6px 14px rgba(0,0,0,.4);}
  .btn.alt{background:linear-gradient(180deg,#46e0a0,#2bbf86);box-shadow:0 6px 0 #15795a,0 10px 22px rgba(0,0,0,.4);color:#062b1d;}
  .btn.alt:active{box-shadow:0 2px 0 #15795a,0 6px 14px rgba(0,0,0,.4);}
  .btn.glogin{background:linear-gradient(180deg,#ffffff,#e0e0e0);box-shadow:0 6px 0 #999,0 10px 22px rgba(0,0,0,.4);color:#333; display:flex; align-items:center; gap:8px;}

  /* ---- Character select ---- */
  .select-wrap{width:min(960px,100%);}
  .select-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
  .select-head h2{font-family:'Bungee';margin:0;font-size:clamp(18px,min(5vw,6vh),30px);}
  
  /* 카드 크기 반응형 조절 */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;
    max-height:46vh;overflow-y:auto;padding:6px;}
  .card{background:linear-gradient(180deg,#1d3650,#142436);border:2px solid #28415c;border-radius:16px;
    padding:14px 10px;cursor:pointer;position:relative;transition:transform .1s,border-color .1s;}
  .card:hover{transform:translateY(-3px);}
  .card.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,210,63,.3),0 8px 20px rgba(0,0,0,.4);}
  
  /* 썸네일 겹침 방지 */
  .card .ava{width:60px;height:60px;border-radius:50%!important;margin:0 auto 8px;display:block;
    position:relative; box-shadow:inset 0 -6px 0 rgba(0,0,0,.25);}
  /* 이름 잘림 방지 */
  .card .nm{font-family:'Jua';text-align:center;font-size:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .card .role{text-align:center;font-size:12px;color:var(--muted);margin-top:2px;}
  
  /* 스탯바 너비 조정 */
  .stats{display:flex;flex-direction:column;gap:6px;margin-top:12px;}
  .stat{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
  .stat b{width:34px;display:inline-block;text-align:left;}
  .stat span.val{width:30px;text-align:right;color:#fff;font-weight:bold;}
  .bar{flex:1;height:6px;border-radius:4px;background:#0a1521;overflow:hidden;}
  .bar i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,#3ddc97,#ffd23f);}
  
  .detail{background:var(--panel);border:1px solid #28415c;border-radius:16px;padding:14px 16px;
    margin-top:12px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .detail .big{font-family:'Bungee';font-size:20px;}
  .detail .desc{color:var(--muted);font-size:13px;flex:1;min-width:180px;line-height:1.4;}

  /* ---- HUD ---- */
  #hud{position:absolute;inset:0;z-index:20;pointer-events:none;}
  .topbar{position:absolute;top:max(10px,env(safe-area-inset-top));left:60px;right:60px;
    display:flex;justify-content:center;flex-wrap:wrap;gap:6px;padding:0 8px;}
  .badge{background:var(--panel);border:1px solid #2a4660;border-radius:12px;
    padding:6px 12px;font-family:'Jua';font-size:14px;display:flex;align-items:center;gap:8px;}
  .badge.alive b{color:var(--good);}
  .pill{position:absolute;top:max(10px,env(safe-area-inset-top));right:max(10px,env(safe-area-inset-right));
    max-width:44vw;background:var(--panel);border:1px solid #2a4660;border-radius:12px;padding:6px 10px;font-size:13px;color:var(--muted);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* Mobile controls */
  #touch{position:absolute;inset:0;z-index:22;display:none;}
  .stick{position:absolute;bottom:max(28px,env(safe-area-inset-bottom));width:128px;height:128px;
    border-radius:50%;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.16);
    pointer-events:auto;touch-action:none;}
  #stickL{left:max(22px,env(safe-area-inset-left));}
  #stickR{right:max(22px,env(safe-area-inset-right));border-color:rgba(255,92,138,.4);background:rgba(255,92,138,.07);}
  .knob{position:absolute;left:50%;top:50%;width:54px;height:54px;margin:-27px 0 0 -27px;border-radius:50%;
    background:linear-gradient(180deg,#fff,#cfe);box-shadow:0 4px 10px rgba(0,0,0,.4);transition:opacity .15s;}
  #stickR .knob{background:linear-gradient(180deg,#ffd1de,#ff5c8a);}
  .stick .lbl{position:absolute;left:0;right:0;bottom:-22px;text-align:center;font-family:'Jua';
    font-size:12px;color:var(--muted);}
  #superBtn{position:absolute;right:max(160px,calc(env(safe-area-inset-right) + 158px));
    bottom:max(86px,calc(env(safe-area-inset-bottom) + 58px));
    width:74px;height:74px;border-radius:50%;pointer-events:auto;border:3px solid #ffe071;
    background:radial-gradient(circle at 50% 35%,#ffe071,#ff8c42);font-family:'Bungee';font-size:11px;color:#3a1f02;
    display:flex;align-items:center;justify-content:center;opacity:.45;touch-action:none;}
  #superBtn.ready{opacity:1;animation:pulse 1s infinite;}
  @keyframes pulse{50%{box-shadow:0 0 0 8px rgba(255,210,63,.25);}}
  
  /* Menu Button (Replaces Pause) */
  #menuBtn{position:fixed;top:max(10px,env(safe-area-inset-top));left:max(10px,calc(env(safe-area-inset-left) + 10px));
    z-index:24;pointer-events:auto;width:44px;height:44px;border-radius:12px;border:1px solid #2a4660;
    background:rgba(13,27,42,.85);color:#fff;font-size:18px;cursor:pointer;}
  
  /* Live Menu Overlay */
  #liveMenu{background:rgba(10,21,33,0.85);backdrop-filter:blur(4px);z-index:40;}

  @keyframes ovIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .overlay:not(.hidden){animation:ovIn .22s ease;}

  @media (orientation:landscape) and (max-height:520px){
    .overlay{gap:10px;}
    .logo{font-size:clamp(22px,8vh,40px);}
    .logo small{font-size:clamp(10px,3vh,15px);margin-top:3px;}
    .grid{max-height:38vh;}
    .btn{padding:10px 22px;}
    .stick{width:104px;height:104px;bottom:max(14px,env(safe-area-inset-bottom));}
    #stickL{left:max(14px,env(safe-area-inset-left));}
    #stickR{right:max(14px,env(safe-area-inset-right));}
    .stick .lbl{bottom:-18px;font-size:11px;}
    #superBtn{width:60px;height:60px;right:max(130px,calc(env(safe-area-inset-right) + 128px));bottom:max(58px,calc(env(safe-area-inset-bottom) + 38px));}
    #skillBtn{width:52px;height:52px;right:max(132px,calc(env(safe-area-inset-right) + 130px));bottom:max(122px,calc(env(safe-area-inset-bottom) + 100px));}
    #questBody,#rankBody{max-height:52vh;}
    .shopGrid{max-height:44vh;}
  }
  @media (max-width:380px){
    .badge{font-size:12px;padding:5px 8px;gap:5px;}
    .pill{font-size:11px;padding:5px 8px;max-width:40vw;}
    #menuBtn{width:40px;height:40px;font-size:16px;}
  }

  #skillBtn{position:absolute;right:max(160px,calc(env(safe-area-inset-right) + 158px));
    bottom:max(168px,calc(env(safe-area-inset-bottom) + 140px));
    width:60px;height:60px;border-radius:50%;pointer-events:auto;border:3px solid #6fd3ff;
    background:radial-gradient(circle at 50% 35%,#cdf2ff,#3aa0e0);font-size:26px;
    display:flex;align-items:center;justify-content:center;opacity:.5;touch-action:none;}
  #skillBtn.ready{opacity:1;}
  #skillBtn .cd{position:absolute;font-family:'Bungee';font-size:15px;color:#06243a;}
  .skillRow{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .skillCard{flex:1;min-width:96px;background:#142436;border:2px solid #28415c;border-radius:14px;padding:8px;cursor:pointer;text-align:center}
  .skillCard.sel{border-color:#6fd3ff;box-shadow:0 0 0 3px rgba(111,211,255,.25)}
  .skillCard .ic{font-size:24px}
  .skillCard .sn{font-family:'Jua';font-size:13px;margin-top:2px}
  .skillCard .sd{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.25}

  .lvtag{margin-top:6px;font-family:'Jua';font-size:11px;color:var(--accent);}
  .xpmini{height:4px;border-radius:3px;background:#0a1521;overflow:hidden;margin-top:3px;}
  .xpmini i{display:block;height:100%;background:linear-gradient(90deg,#6fd3ff,#3ddc97);}
  
  #rankBody{width:min(480px,100%);max-height:60vh;overflow-y:auto;padding:4px;}
  .rrow{display:flex;align-items:center;gap:10px;background:#142436;border:1px solid #28415c;border-radius:12px;padding:9px 12px;margin-bottom:7px;}
  .rrow.me{border-color:var(--accent);box-shadow:0 0 0 2px rgba(255,210,63,.25);}
  .rrk{font-family:'Bungee';font-size:16px;width:34px;text-align:center;color:var(--muted);}
  .rrow.me .rrk{color:var(--accent);}
  .rrow.top{background:linear-gradient(90deg,rgba(255,210,63,.12),#142436);}
  .rnk .rtier{font-size:11px;margin-left:8px;font-family:'Jua';opacity:.95;}
  .rankHead{background:linear-gradient(160deg,#16314a,#0e1c2c);border:2px solid #2a4660;border-radius:16px;padding:14px;margin-bottom:10px;text-align:center;}
  .rhTier{font-family:'Bungee';font-size:22px;}
  .rhTr{font-family:'Jua';font-size:18px;color:#ffd23f;margin-top:2px;}
  .rhBar{height:10px;border-radius:6px;background:#0a1521;overflow:hidden;margin:8px 0 6px;}
  .rhBar i{display:block;height:100%;border-radius:6px;}
  .rhSub{font-size:12px;color:var(--muted);}
  .rnk{font-family:'Jua';flex:1;}
  .rtr{font-family:'Jua';color:#ffd23f;}
  .card{position:relative;}
  .card.locked{opacity:.5;}
  .lockbadge{position:absolute;top:8px;right:8px;font-size:18px;}
  .shopGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:10px;max-height:52vh;overflow-y:auto;padding:4px;}
  .shopCard{background:#142436;border:2px solid #28415c;border-radius:14px;padding:10px;text-align:center;}
  .shopCard.owned{border-color:var(--good);}
  .shopCard canvas{width:56px;height:56px;}
  .shopCard .nm{font-family:'Jua';font-size:14px;margin-top:4px;}
  .shopCard .pbtn{margin-top:8px;width:100%;font-family:'Jua';font-size:13px;border:none;border-radius:10px;padding:8px;cursor:pointer;background:linear-gradient(180deg,#ffe071,#ffd23f);color:#3a2a05;}
  .shopCard .pbtn.dis{background:#26405a;color:#9fb3c8;cursor:default;}
  .skinSwatch{width:56px;height:56px;border-radius:14px;margin:0 auto;border:2px solid rgba(255,255,255,.3);}
  .btn.shopTab.on{background:var(--accent);color:#1a1300;}
  .pbtn.alt2{background:linear-gradient(180deg,#9fe3ff,#3aa0e0);color:#06243a;}
  .loadoutBar{grid-column:1/-1;background:#102132;border:1px solid #28415c;border-radius:12px;padding:9px 12px;font-family:'Jua';text-align:center;font-size:15px;}
  .shopCard .ciIcon{font-size:30px;}
  .shopCard .ciOwn{font-size:10px;color:var(--accent);margin-top:4px;}
  .gachaResult{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px;min-height:96px;}
  .gcard{width:86px;padding:12px 6px;border-radius:14px;text-align:center;animation:pop .4s ease;box-shadow:0 6px 16px rgba(0,0,0,.4);}
  .gcard .gi{font-size:30px;} .gcard .gt{font-size:11px;font-family:'Jua';margin-top:5px;}
  .gcard .gsw{width:36px;height:36px;border-radius:9px;margin:0 auto;border:2px solid rgba(255,255,255,.4);}
  @keyframes pop{0%{transform:scale(.3);opacity:0}100%{transform:scale(1);opacity:1}}
  .rar-epic{background:linear-gradient(180deg,#ffd86b,#e8a92b);color:#3a2a05;}
  .rar-rare{background:linear-gradient(180deg,#a0d8ff,#4aa0e0);color:#06243a;}
  .rar-common{background:#26405a;color:#cfe;}
  .rar-g1{background:linear-gradient(180deg,#9fe3ff,#3aa0e0);color:#06243a;}
  .rar-g2{background:linear-gradient(180deg,#d6bcff,#9c6bff);color:#1a0a3a;}
  .rar-g3{background:linear-gradient(180deg,#fff2a8,#ffce3a);color:#3a2a05;box-shadow:0 0 18px rgba(255,210,63,.6);}
  .ugrade{font-family:'Bungee';font-size:11px;}
  .ultCard.ult-g1{border-color:#4aa0e0;}
  .ultCard.ult-g2{border-color:#b388ff;}
  .ultCard.ult-g3{border-color:#ffd23f;box-shadow:0 0 14px rgba(255,210,63,.35);}
  .profilePill{font-family:'Jua';background:var(--panel);border:1px solid #2a4660;border-radius:12px;padding:8px 14px;font-size:14px;text-align:center;line-height:1.5;}
  .qsec{font-family:'Bungee';font-size:15px;margin:14px 0 8px;color:var(--accent);}
  .qcard{background:#142436;border:1px solid #28415c;border-radius:14px;padding:10px 12px;margin-bottom:8px;}
  .qcard.qdone{border-color:var(--good);opacity:.85;}
  .qn{font-family:'Jua';font-size:14px;margin-bottom:6px;}
  .qbarwrap{height:8px;background:#0a1521;border-radius:5px;overflow:hidden;}
  .qbar{height:100%;border-radius:5px;background:linear-gradient(90deg,#3ddc97,#ffd23f);}
  .qmeta{font-size:11px;color:var(--muted);margin-top:5px;}
  #questBody{width:min(560px,100%);max-height:62vh;overflow-y:auto;padding:4px;}
  .coinPill{font-family:'Jua';background:var(--panel);border:1px solid #2a4660;border-radius:12px;padding:6px 14px;font-size:16px;}
  #toast{position:fixed;left:50%;top:14%;transform:translateX(-50%) translateY(-12px);z-index:50;
    background:rgba(13,27,42,.95);border:1px solid var(--good);color:#fff;font-family:'Jua';font-size:14px;
    padding:10px 18px;border-radius:14px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;box-shadow:0 8px 24px rgba(0,0,0,.5);}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  
  /* 배너 수정 (안전 필터 회피 위해 클래스명 변경) */
  #comboBanner{position:fixed;left:50%;top:28%;transform:translateX(-50%);z-index:30;text-align:center;pointer-events:none;opacity:0;}
  #comboBanner.show{animation:kbAnim 1.7s ease forwards;}
  @keyframes kbAnim{0%{opacity:0;transform:translateX(-50%) scale(.5)}14%{opacity:1;transform:translateX(-50%) scale(1.12)}28%{transform:translateX(-50%) scale(1)}82%{opacity:1}100%{opacity:0}}
  #comboBanner .kbMain{font-family:'Bungee';font-size:clamp(24px,min(8vw,9vh),54px);text-shadow:0 3px 14px rgba(0,0,0,.65);display:block;}
  #comboBanner .kbSub{font-family:'Jua';font-size:16px;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.6);}
  
  #gachaCele{position:fixed;inset:0;z-index:60;pointer-events:none;opacity:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #gachaCele.show{animation:celeFade 1.9s ease forwards;}
  @keyframes celeFade{0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0}}
  #gachaCele .celeRays{position:absolute;width:160vmax;height:160vmax;border-radius:50%;
    background:repeating-conic-gradient(var(--cc,#ffd23f) 0 7deg, transparent 7deg 22deg);opacity:.16;animation:celeSpin 2.2s linear;}
  @keyframes celeSpin{to{transform:rotate(360deg)}}
  #gachaCele .celeText{position:relative;font-family:'Bungee';font-size:clamp(28px,9vmin,72px);color:var(--cc,#ffd23f);
    text-shadow:0 4px 22px rgba(0,0,0,.6);animation:celePop .6s cubic-bezier(.2,1.5,.4,1);}
  @keyframes celePop{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.18)}100%{transform:scale(1);opacity:1}}
  #gachaCele .celeConfetti{position:absolute;inset:0;}
  .confetti{position:absolute;top:-24px;width:10px;height:14px;border-radius:2px;animation:confFall linear forwards;}
  @keyframes confFall{to{transform:translateY(112vh) rotate(900deg);opacity:.15}}
  
  .resultTitle{font-family:'Bungee';font-size:clamp(28px,min(11vw,14vh),84px);}
  .win{color:var(--accent);text-shadow:0 0 24px rgba(255,210,63,.5);}
  .lose{color:var(--bad);}
  .kbd{display:inline-block;background:#0a1521;border:1px solid #2a4660;border-bottom-width:3px;
    border-radius:6px;padding:1px 7px;font-family:monospace;font-size:13px;margin:0 1px;}
</style>
</head>
<body>
<div id="app">
  <canvas id="cv"></canvas>
  <div id="toast"></div>
  <div id="comboBanner"><span class="kbMain"></span><span class="kbSub"></span></div>
  <div id="gachaCele"><div class="celeRays"></div><div class="celeText"></div><div class="celeConfetti"></div></div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="topbar">
      <div class="badge alive" id="scoreBadge">생존 <b>1</b></div>
      <div class="badge" id="charBadge">캐릭터</div>
      <div class="badge" id="skillBadge" style="color:#6fd3ff">스킬</div>
    </div>
    <div class="pill" id="hintPill"></div>
    <button id="menuBtn">🍔</button>
  </div>

  <!-- Mobile touch controls -->
  <div id="touch">
    <div id="stickL" class="stick"><div class="knob"></div><div class="lbl">이동</div></div>
    <div id="stickR" class="stick"><div class="knob"></div><div class="lbl">조준 → 떼면 발사</div></div>
    <div id="superBtn">SUPER</div>
    <div id="skillBtn"><span class="ic">✨</span><span class="cd"></span></div>
  </div>

  <!-- Main menu -->
  <div id="menu" class="overlay">
    <div class="logo">NEON ANIMALS<small>TOP-DOWN ACTION SHOOTER</small></div>
    <div class="profilePill" id="profilePill"></div>
    <p class="tip" id="ctrlTip"></p>
    <button class="btn alt" id="toSelect">게임 시작 ▶</button>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
      <button class="btn" id="toShop" style="font-size:15px;padding:10px 16px">🛒 상점</button>

  ctx(){ const AC=(typeof AudioContext!=='undefined')?AudioContext:(typeof webkitAudioContext!=='undefined'?webkitAudioContext:null); if(!AC)return null;
    if(!this.ac){ this.ac=new AC(); this.master=this.ac.createGain(); this.master.gain.value=0.22; this.master.connect(this.ac.destination); }
    if(this.ac.state==='suspended') this.ac.resume(); return this.ac; },
  unlock(){ this.ctx(); },
  tone(freq,dur,type,vol,slide){ if(!this.on)return; const ac=this.ctx(); if(!ac)return;
    const o=ac.createOscillator(),g=ac.createGain(); o.type=type; o.frequency.setValueAtTime(freq,ac.currentTime);
    if(slide) o.frequency.exponentialRampToValueAtTime(slide,ac.currentTime+dur);
    g.gain.setValueAtTime(vol,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.0008,ac.currentTime+dur);
    o.connect(g); g.connect(this.master); o.start(); o.stop(ac.currentTime+dur); },
  noise(dur,vol){ if(!this.on)return; const ac=this.ctx(); if(!ac)return; const n=(ac.sampleRate*dur)|0, b=ac.createBuffer(1,n,ac.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n); const sN=ac.createBufferSource(); sN.buffer=b; const g=ac.createGain(); g.gain.value=vol; sN.connect(g); g.connect(this.master); sN.start(); },
  shoot(){ this.tone(620,0.07,'square',0.35,360); },
  snipe(){ this.tone(900,0.16,'sawtooth',0.4,200); },

const cv = document.getElementById('cv');

function resize(){
  VW = window.innerWidth; VH = window.innerHeight;

}

const input = { move:{x:0,y:0}, aim:{x:1,y:0}, firing:false, fireOnce:false, superReq:false, skillReq:false, hasAim:false };

  const m=Math.hypot(dx,dy)||1; 
  
  // 터치 조이스틱 입력과 합산 (충돌 방지)
  if(!IS_TOUCH || (dx!==0 || dy!==0)) {
    input.move.x=dx/m; input.move.y=dy/m;
  }

    const ax = mx - sp.x, ay = my - sp.y, am = Math.hypot(ax,ay)||1;

  }
};

function setupStick(id, onMove, onEnd){
  const el = document.getElementById(id);
  const knob = el.querySelector('.knob');
  let touchId=null, cx=0, cy=0;
  const R=52;
  const pos = e=>{ const t=[...(e.touches||[e])].find(t=>t.identifier===touchId)||e; return {x:t.clientX,y:t.clientY}; };
  const start = e=>{
    e.preventDefault();
    const t=(e.touches?e.touches[e.touches.length-1]:e);
    touchId = e.touches? t.identifier : 'mouse';
    const r=el.getBoundingClientRect(); cx=r.left+r.width/2; cy=r.top+r.height/2;
    move(e);
  };
  const move = e=>{
    if(touchId===null) return;
    e.preventDefault();
    const p=pos(e); let dx=p.x-cx, dy=p.y-cy; const d=Math.hypot(dx,dy);
    if(d>R){ dx=dx/d*R; dy=dy/d*R; }
    knob.style.transform=`translate(${dx}px,${dy}px)`;
    onMove({x:dx/R, y:dy/R});
  };
  const end = e=>{ touchId=null; knob.style.transform='translate(0,0)';
    onMove({x:0,y:0}); if(onEnd)onEnd(); };
  el.addEventListener('touchstart',start,{passive:false});
  el.addEventListener('touchmove',move,{passive:false});
  el.addEventListener('touchend',end); el.addEventListener('touchcancel',end);
}

function tryFire(e){
  if(e.ammo<1 || e.fireCd>0 || !e.alive) return;

  // 자동 조준 로직
  if(e.isPlayer && (!input.hasAim || input.fireOnce || performance.now()-lastAimT > 1000)){
    let best=null, bd=1e9;
    entities.forEach(t=>{ 
      if(t!==e && t.alive && enemyOf(t,e)){ 
        const d=Math.hypot(t.x-e.x, t.y-e.y); 
        if(d < bd && !lineBlocked(e.x, e.y, t.x, t.y)){ bd=d; best=t; } 
      }
    });
    if(best){
      const dx = best.x - e.x, dy = best.y - e.y, d = Math.hypot(dx,dy)||1;
      e.aim.x = dx/d; e.aim.y = dy/d;
    }
  }

  const a=e.cfg.attack; e.ammo--; e.fireCd = a.type==='rapid'?0.12 : (a.type==='sniper'?0.5:0.28);
  spawnAttack(e, a, false);
  if(e.isPlayer) SND[a.type==='sniper'?'snipe':'shoot']();
}

/* 7. DAMAGE / DEFEAT */
function damage(t, dmg, src, silent){ if(!t.alive) return; if(t.invuln>0){ t.flash=0.08; return; } if(t.shield>0){ const ab=Math.min(t.shield,dmg); t.shield-=ab; dmg-=ab; } if(dmg<=0){ t.flash=0.1; return; } t.hp-=dmg; t.flash=0.12; if(!silent){ const big = dmg>=800; float(t.x,t.y,"-"+Math.round(dmg), t.isPlayer?"#ff6b6b":(big?"#ffd23f":"#fff"), big?1.5:1); rings.push({x:t.x,y:t.y,r:t.radius,maxR:t.radius+(big?34:20),life:0.25,max:0.25,color:big?"#ffd23f":"#fff",width:big?5:3}); if(t.isPlayer){ shake=Math.min(16,shake+5); hurtV=Math.min(1,hurtV+0.5); } if(t.isPlayer||(src&&src.isPlayer)) SND.hit(); } if(src){ src.superCharge=Math.min(src.superMax, src.superCharge+dmg*0.55); }
  if(t.hp<=0){ t.alive=false; SND.knockout(); if(t.isPlayer){ scoreStreak=0; multiScore=0; } screenFlash=Math.max(screenFlash, t.isPlayer?0.5:0.3); shake=Math.min(16,shake+10); rings.push({x:t.x,y:t.y,r:t.radius,maxR:t.radius+130,life:0.5,max:0.5,color:t.color,width:8}); for(let i=0;i<36;i++) particles.push(spark(t.x,t.y,t.color,true)); if(src && src.isPlayer && t!==src){ questAdd('takedowns',1); matchStats.takedowns++; onPlayerScore(); } if(mode.respawn){ if(src && enemyOf(src,t)){ teamScore[src.team]++; float(t.x,t.y,"격추 +1",TEAM_COLOR[src.team],1.4); } t.respawnT = 2.0; updateScoreboard(); checkTeamWin(); } else { checkWin(); } } }
function checkWin(){ const alive = entities.filter(e=>e.alive); updateScoreboard(); if(gameOver) return; if(!player.alive){ endMatch(false); } else if(alive.length===1 && alive[0]===player){ endMatch(true); } }
function endMatch(win){ gameOver=true; running=false; if(win) questAdd('wins',1); onMatchResult(win); SND[win?'win':'lose'](); setTimeout(()=>{ document.getElementById('hud').classList.add('hidden'); const r=document.getElementById('result'); const rt=document.getElementById('resultText'); rt.textContent = win?"VICTORY":"DEFEAT"; rt.className = "resultTitle "+(win?"win":"lose"); const lv=levelOf(currentCharId); document.getElementById('resultSub').innerHTML = (win?"최후의 1인! 🏆":"쓰러졌습니다. 다시 도전!") + '<br><span style="color:#6fd3ff">+'+lastXP+' XP</span> · 🏆 '+(lastTr>=0?'+':'')+lastTr + ' · '+byId(currentCharId).name+' Lv.'+lv; r.classList.remove('hidden'); }, 900); }

/* 8. BOT AI */
function updateBot(b, dt){ const ai=b.aiState; ai.t+=dt; ai.retarget-=dt; if(ai.retarget<=0 || !aliveEntity(ai.targetId)){ let best=null,bd=1e9; entities.forEach(e=>{ if(enemyOf(e,b) && e.alive){ const d=Math.hypot(e.x-b.x,e.y-b.y); const hidden = (inBush(e.x,e.y)||e.cloakT>0) && d>180; if(!hidden && d<bd){bd=d;best=e;} } }); ai.targetId = best?entities.indexOf(best):null; ai.retarget = 0.4; if(Math.random()<0.5) ai.strafe*=-1; } const tgt = ai.targetId!=null?entities[ai.targetId]:null; let mx=0,my=0; if(tgt && tgt.alive){ const dx=tgt.x-b.x, dy=tgt.y-b.y, d=Math.hypot(dx,dy)||1; b.aim.x=dx/d; b.aim.y=dy/d; const pref=b.cfg.attack.range*0.7; if(d>pref){ mx=dx/d; my=dy/d; } else if(d<pref*0.55){ mx=-dx/d; my=-dy/d; } mx += -dy/d*ai.strafe*0.6; my += dx/d*ai.strafe*0.6; if(d < b.cfg.attack.range && !lineBlocked(b.x,b.y,tgt.x,tgt.y)) tryFire(b); if(b.superCharge>=b.superMax && d<b.cfg.attack.range*0.9 && Math.random()<0.02) activateSuper(b); if(b.skillId && b.skillCd<=0 && Math.random()<0.015) activateSkill(b); } else { mx=Math.cos(ai.t*0.7); my=Math.sin(ai.t*0.5); } const m=Math.hypot(mx,my)||1; applyMove(b, mx/m, my/m, dt); }
const aliveEntity = id => id!=null && entities[id] && entities[id].alive;

/* 9. MOVEMENT / AMMO */
function applyMove(e, dx, dy, dt){ const moving=(dx||dy); e.moving=!!moving; e.animPhase=(e.animPhase||0)+dt*(moving?11:3); const sp=e.cfg.speed*(e.speedMul||1)*(e.matchSpeed||1); moveWithWalls(e, e.x+dx*sp*dt, e.y+dy*sp*dt); }
function updateAmmo(e, dt){ if(e.fireCd>0) e.fireCd-=dt; if(e.ammo<e.maxAmmo){ e.reloadT+=dt; if(e.reloadT>=e.cfg.reload){ e.reloadT=0; e.ammo++; } } if(e.shieldT>0){ e.shieldT-=dt; if(e.shieldT<=0) e.shield=0; } if(e.flash>0) e.flash-=dt; if(e.skillCd>0) e.skillCd-=dt; if(e.speedT>0){ e.speedT-=dt; if(e.speedT<=0) e.speedMul=1; } if(e.dmgT>0){ e.dmgT-=dt; if(e.dmgT<=0) e.dmgMul=1; } if(e.cloakT>0) e.cloakT-=dt; if(e.invuln>0) e.invuln-=dt; }

/* 10. PROJECTILES */
function updateProjectiles(dt){ for(let i=projectiles.length-1;i>=0;i--){ const p=projectiles[i]; if(p.homing){ let best=null,bd=1e9; entities.forEach(e=>{ if(e!==p.owner&&e.alive&&enemyOf(e,p.owner)){const d=Math.hypot(e.x-p.x,e.y-p.y);if(d<bd){bd=d;best=e;}}}); if(best){ const desired=Math.atan2(best.y-p.y,best.x-p.x); let da=((desired-p.ang+Math.PI*3)%(Math.PI*2))-Math.PI; p.ang += clamp(da, -p.turn*dt, p.turn*dt); p.vx=Math.cos(p.ang)*p.speed; p.vy=Math.sin(p.ang)*p.speed; } } const stepX=p.vx*dt, stepY=p.vy*dt; p.x+=stepX; p.y+=stepY; p.traveled+=Math.hypot(stepX,stepY); p.trail.push({x:p.x,y:p.y}); if(p.trail.length>7) p.trail.shift(); if(p.x<0||p.y<0||p.x>WORLD.w||p.y>WORLD.h){ if(p.aoe) splashDamage(p.owner,p.x,p.y,p.aoe,p.dmg); explode(p); projectiles.splice(i,1); continue; } let wIdx=-1; for(let wi=0;wi<walls.length;wi++){ const w=walls[wi]; if(p.x>=w.x&&p.x<=w.x+w.w&&p.y>=w.y&&p.y<=w.y+w.h){ wIdx=wi; break; } } if(wIdx>=0){ const w=walls[wIdx]; if(p.wall>0){ w.hp-=p.wall; for(let k=0;k<5;k++) particles.push(spark(p.x,p.y,'#b07c42')); if(w.hp<=0) destroyWall(wIdx); } if(p.aoe) splashDamage(p.owner,p.x,p.y,p.aoe,p.dmg); explode(p); projectiles.splice(i,1); continue; } let itHit=false; for(const it of items){ if(Math.hypot(it.x-p.x,it.y-p.y) < it.r+p.r){ it.hp-=p.dmg; rings.push({x:it.x,y:it.y,r:it.r*0.6,maxR:it.r+6,life:0.14,max:0.14,color:"#fff",width:2}); if(it.hp<=0) breakItem(it, p.owner); if(!p.pierce) itHit=true; break; } } if(itHit){ projectiles.splice(i,1); continue; } let hit=false; for(const e of entities){ if(e===p.owner||!e.alive||p.hitSet.has(e)||!enemyOf(e,p.owner)) continue; if(Math.hypot(e.x-p.x,e.y-p.y) < e.radius+p.r){ if(p.aoe){ splashDamage(p.owner,p.x,p.y,p.aoe,p.dmg); explode(p); } else { damage(e,p.dmg,p.owner); for(let k=0;k<6;k++){ const sp=spark(p.x,p.y,p.color); sp.vx=-p.vx*0.04+(Math.random()-0.5)*120; sp.vy=-p.vy*0.04+(Math.random()-0.5)*120; particles.push(sp); } rings.push({x:p.x,y:p.y,r:2,maxR:p.r*4,life:0.18,max:0.18,color:"#fff",width:2}); } p.hitSet.add(e); if(!p.pierce){ hit=true; break; } } } if(hit){ projectiles.splice(i,1); continue; } if(p.traveled>=p.range){ if(p.aoe) splashDamage(p.owner,p.x,p.y,p.aoe,p.dmg); explode(p); projectiles.splice(i,1); } } }
function explode(p){ if(p.aoe){ for(let i=0;i<12;i++){const s=spark(p.x,p.y,p.color);s.life=0.4;particles.push(s);} } }
function destroyWall(idx){ const w=walls[idx]; if(!w) return; const cx=w.x+w.w/2, cy=w.y+w.h/2; rings.push({x:cx,y:cy,r:8,maxR:Math.max(w.w,w.h)+44,life:0.5,max:0.5,color:'#d9a441',width:7}); for(let k=0;k<26;k++) particles.push(spark(w.x+Math.random()*w.w, w.y+Math.random()*w.h, '#9c6b3a', true)); screenFlash=Math.max(screenFlash,0.14); shake=Math.min(16,shake+6); if(SND&&SND.hit)SND.hit(); walls.splice(idx,1); }
function drawTree(b){ const T=THEME; ctx.fillStyle="rgba(0,0,0,.2)"; ctx.beginPath();ctx.ellipse(b.x,b.y+b.r*0.5,b.r*0.85,b.r*0.4,0,0,7);ctx.fill(); ctx.fillStyle=T.obsDark; b.blobs.forEach(bl=>{ ctx.beginPath();ctx.arc(b.x+bl.dx,b.y+bl.dy,bl.r,0,7);ctx.fill(); }); ctx.fillStyle=T.obsLight; b.blobs.forEach(bl=>{ ctx.beginPath();ctx.arc(b.x+bl.dx-bl.r*0.2,b.y+bl.dy-bl.r*0.25,bl.r*0.55,0,7);ctx.fill(); }); }
function drawCrate(w){ ctx.fillStyle="rgba(0,0,0,.28)"; roundRect(w.x+4,w.y+7,w.w,w.h,6); ctx.fill(); const g=ctx.createLinearGradient(0,w.y,0,w.y+w.h); g.addColorStop(0,THEME.wallTop); g.addColorStop(1,THEME.wallBot); ctx.fillStyle=g; roundRect(w.x,w.y,w.w,w.h,6); ctx.fill(); ctx.strokeStyle=THEME.wallLine; ctx.lineWidth=3; roundRect(w.x,w.y,w.w,w.h,6); ctx.stroke(); }
function drawItem(it){ const pulse=0.6+0.4*Math.sin(performance.now()/250); ctx.save(); ctx.translate(it.x,it.y); ctx.globalCompositeOperation="lighter"; ctx.globalAlpha=0.45*pulse; ctx.fillStyle="#6fe0ff"; ctx.beginPath();ctx.arc(0,0,it.r*1.7,0,7);ctx.fill(); ctx.globalAlpha=1; ctx.globalCompositeOperation="source-over"; ctx.fillStyle="#7fe9ff"; ctx.strokeStyle="#0b3a4a"; ctx.lineWidth=2; ctx.beginPath();ctx.moveTo(0,-it.r);ctx.lineTo(it.r*0.7,0);ctx.lineTo(0,it.r);ctx.lineTo(-it.r*0.7,0);ctx.closePath();ctx.fill();ctx.stroke(); ctx.fillStyle="#eaffff"; ctx.font="bold 9px Jua,sans-serif"; ctx.textAlign="center"; ctx.fillText("XP",0,it.r+11); ctx.restore(); }
function breakItem(it, by){ const idx=items.indexOf(it); if(idx<0) return; items.splice(idx,1); rings.push({x:it.x,y:it.y,r:6,maxR:it.r+42,life:0.45,max:0.45,color:"#7fe9ff",width:6}); for(let k=0;k<18;k++) particles.push(spark(it.x,it.y,"#7fe9ff",true)); screenFlash=Math.max(screenFlash,0.12); if(by && by.isPlayer){ gainXP(currentCharId, ITEM_XP); float(it.x,it.y,"+"+ITEM_XP+" XP","#7fe9ff",1.3); showToast('💎 XP 아이템 획득 +'+ITEM_XP+' XP'); SND.pickup(); } }

/* 11. FX */
function spark(x,y,color,big){ const a=Math.random()*Math.PI*2,s=(big?180:90)*(0.4+Math.random()); return {x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.3+Math.random()*0.2,max:0.5,color,r:(big?4:2)+Math.random()*2}; }
function updateParticles(dt){ if(particles.length>520) particles.splice(0,particles.length-520); for(let i=particles.length-1;i>=0;i--){const p=particles[i]; p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.9;p.vy*=0.9;p.life-=dt; if(p.life<=0)particles.splice(i,1);} }
function float(x,y,txt,color,scale=1){ floaters.push({x,y,txt,color,life:0.9,scale}); }
function updateFloaters(dt){ for(let i=floaters.length-1;i>=0;i--){const f=floaters[i];f.y-=34*dt;f.life-=dt;if(f.life<=0)floaters.splice(i,1);} }
function updateFX(dt){ for(let i=rings.length-1;i>=0;i--){const r=rings[i];r.life-=dt;const k=1-Math.max(0,r.life/r.max); r.r=r.r+(r.maxR-r.r)*Math.min(1,k*0.5+0.04); if(r.life<=0)rings.splice(i,1);} for(let i=flashes.length-1;i>=0;i--){flashes[i].life-=dt; if(flashes[i].life<=0)flashes.splice(i,1);} entities.forEach(e=>{ if(e.recoil>0) e.recoil=Math.max(0,e.recoil-40*dt); }); cam.zoomPunch*=Math.pow(0.0005,dt); if(cam.zoomPunch<0.002)cam.zoomPunch=0; hurtV=Math.max(0,hurtV-dt*1.6); screenFlash=Math.max(0,screenFlash-dt*2.2); shake*=Math.pow(0.001,dt); }

/* 12. RENDER */
function worldToScreen(wx,wy){ return { x:(wx-cam.x)*cam.zoom+VW/2, y:(wy-cam.y)*cam.zoom+VH/2 }; }
function render(){
  ctx.save(); ctx.scale(DPR,DPR); ctx.clearRect(0,0,VW,VH); ctx.fillStyle="#0a1521"; ctx.fillRect(0,0,VW,VH);
  ctx.save(); ctx.translate(VW/2+cam.sx,VH/2+cam.sy); ctx.scale(cam.zoom,cam.zoom); ctx.translate(-cam.x,-cam.y);
  ctx.fillStyle=THEME.ground; ctx.fillRect(0,0,WORLD.w,WORLD.h);
  ctx.fillStyle=THEME.grid; for(let y=0;y<WORLD.h;y+=120){ for(let x=((y/120)%2?120:0);x<WORLD.w;x+=240){ ctx.fillRect(x,y,120,120); } }
  if(THEME.dot){ ctx.fillStyle=THEME.tuft; grassTufts.forEach(g=>{ ctx.beginPath();ctx.arc(g.x,g.y,g.s*0.55,0,7);ctx.fill(); }); } else { ctx.strokeStyle=THEME.tuft; ctx.lineWidth=2; ctx.lineCap="round"; grassTufts.forEach(g=>{ ctx.beginPath();ctx.moveTo(g.x,g.y);ctx.lineTo(g.x,g.y-g.s*2);ctx.stroke(); }); }
  ctx.lineWidth=16; ctx.strokeStyle=THEME.border1; ctx.strokeRect(0,0,WORLD.w,WORLD.h); ctx.lineWidth=6; ctx.strokeStyle=THEME.border2; ctx.strokeRect(0,0,WORLD.w,WORLD.h);

  walls.forEach(w=>drawCrate(w)); items.forEach(it=>drawItem(it)); bushes.forEach(b=>drawTree(b));
  
  if(player && player.alive && countdownT <= 0){
    const ang=Math.atan2(player.aim.y,player.aim.x), range=player.cfg.attack.range;
    ctx.save(); ctx.translate(player.x,player.y); ctx.rotate(ang);
    ctx.strokeStyle="rgba(255,255,255,.3)"; ctx.lineWidth=3; ctx.setLineDash([12,10]);
    ctx.beginPath();ctx.moveTo(player.radius+6,0);ctx.lineTo(range-26,0);ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=player.color; ctx.beginPath();ctx.moveTo(range,0);ctx.lineTo(range-26,-13);ctx.lineTo(range-26,13);ctx.closePath();ctx.fill();
    ctx.restore();
  }

  ctx.save(); ctx.globalCompositeOperation="lighter";
  projectiles.forEach(p=>{ for(let i=0;i<p.trail.length;i++){const tp=p.trail[i];const a=(i+1)/p.trail.length; ctx.globalAlpha=a*0.35; ctx.fillStyle=p.isSuper?"#fff":p.color; ctx.beginPath();ctx.arc(tp.x,tp.y,p.r*a*(p.isSuper?1.5:0.9),0,7);ctx.fill();} ctx.globalAlpha=1; ctx.fillStyle=p.isSuper?"#fff":p.color; ctx.shadowColor=p.color; ctx.shadowBlur=14; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.ang||0); const r=p.r*(p.isSuper?1.5:1); ctx.beginPath();ctx.arc(0,0,r,0,7);ctx.fill(); ctx.restore(); ctx.shadowBlur=0; });
  ctx.restore(); ctx.globalAlpha=1;

  entities.forEach(e=>{ if(!e.alive)return; const hidden = enemyOf(e,player) && (inBush(e.x,e.y)||e.cloakT>0) && player.alive && Math.hypot(e.x-player.x,e.y-player.y)>180; drawEntity(e, hidden); });
  particles.forEach(p=>{ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.color; ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill(); }); ctx.globalAlpha=1;

  ctx.save(); ctx.globalCompositeOperation="lighter";
  rings.forEach(r=>{ const a=Math.max(0,r.life/r.max); ctx.globalAlpha=a; ctx.strokeStyle=r.color; ctx.lineWidth=r.width*a; ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,7);ctx.stroke(); });
  ctx.restore(); ctx.globalAlpha=1;

  floaters.forEach(f=>{ ctx.globalAlpha=Math.max(0,f.life/0.9); const pop=1+Math.max(0,(f.life-0.78))/0.12*0.5; const fs=Math.round(20*(f.scale||1)*pop); ctx.font="bold "+fs+"px Jua, sans-serif"; ctx.fillStyle=f.color; ctx.textAlign="center"; ctx.lineWidth=4; ctx.strokeStyle="rgba(0,0,0,.6)"; ctx.strokeText(f.txt,f.x,f.y); ctx.fillText(f.txt,f.x,f.y); });
  ctx.globalAlpha=1; ctx.restore();

  // 카운트다운 렌더링
  if(countdownT > 0) {
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fillRect(0,0,VW,VH);
      ctx.font = "bold 120px Bungee, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#ffd23f";
      ctx.shadowColor = "rgba(0,0,0,0.8)";
      ctx.shadowBlur = 20;
      let text = Math.ceil(countdownT);
      if(text === 4) text = "";
      else if(text === 0) text = "START!";
      ctx.fillText(text, VW/2, VH/2);
      ctx.shadowBlur = 0;
  }

  drawMinimap(); ctx.restore();
}
function shade(hex,amt){ let c=(hex||'#888').replace('#',''); if(c.length===3)c=c.split('').map(x=>x+x).join(''); const r=clamp(parseInt(c.slice(0,2),16)+amt,0,255), g=clamp(parseInt(c.slice(2,4),16)+amt,0,255), b=clamp(parseInt(c.slice(4,6),16)+amt,0,255); return 'rgb('+r+','+g+','+b+')'; }
function drawCharacter(e, hidden){ const R=e.radius, t=e.animPhase||0; const bob = e.moving ? Math.abs(Math.sin(t))*2.4 : Math.sin(t*0.6)*0.7; const swing = e.moving ? Math.sin(t)*R*0.34 : 0; const rb = e.recoil>0?e.recoil:0; const ally = (e.team===player.team); const outline = e.isPlayer?"#ffd23f":(ally?"#3ddc97":"#ff5c8a"); ctx.save(); ctx.translate(e.x - e.aim.x*rb, e.y - e.aim.y*rb); ctx.globalAlpha = hidden?0.25:1; if(e.invuln>0) ctx.globalAlpha *= (0.4+0.4*Math.sin(performance.now()/55)); ctx.fillStyle="rgba(0,0,0,.32)"; ctx.beginPath();ctx.ellipse(0,R*0.8,R*0.95,R*0.34,0,0,7);ctx.fill(); ctx.strokeStyle=shade(e.color,-55); ctx.lineWidth=R*0.3; ctx.lineCap="round"; ctx.beginPath();ctx.moveTo(-R*0.28,R*0.28);ctx.lineTo(-R*0.28+swing,R*0.82);ctx.stroke(); ctx.beginPath();ctx.moveTo( R*0.28,R*0.28);ctx.lineTo( R*0.28-swing,R*0.82);ctx.stroke(); ctx.save(); ctx.translate(0,-bob); ctx.fillStyle=e.flash>0?"#fff":e.color; roundRect(-R*0.62,-R*0.18,R*1.24,R*1.0,R*0.42); ctx.fill(); ctx.lineWidth=e.isPlayer?3:2; ctx.strokeStyle=outline; roundRect(-R*0.62,-R*0.18,R*1.24,R*1.0,R*0.42); ctx.stroke(); ctx.fillStyle="rgba(255,255,255,.9)"; ctx.font="bold "+Math.round(R*0.68)+"px Jua,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText((e.name&&e.name[0]!=='B'?e.name[0]:e.cfg.name[0]), 0, R*0.32); ctx.beginPath();ctx.arc(0,-R*0.5,R*0.52,0,7); ctx.fillStyle=e.flash>0?"#fff":shade(e.color,28); ctx.fill(); ctx.lineWidth=e.isPlayer?3:2; ctx.strokeStyle=outline; ctx.stroke(); const ex=e.aim.x*R*0.16, ey=-R*0.5+e.aim.y*R*0.1; ctx.fillStyle="#14202e"; ctx.beginPath();ctx.arc(ex-R*0.16,ey,R*0.1,0,7);ctx.arc(ex+R*0.16,ey,R*0.1,0,7);ctx.fill(); ctx.save(); ctx.rotate(Math.atan2(e.aim.y,e.aim.x)); ctx.strokeStyle=shade(e.color,-28); ctx.lineWidth=R*0.26; ctx.lineCap="round"; ctx.beginPath();ctx.moveTo(R*0.1,0);ctx.lineTo(R*0.95,0);ctx.stroke(); ctx.fillStyle="#2b3442"; roundRect(R*0.8,-R*0.2,R*0.6,R*0.4,3); ctx.fill(); ctx.restore(); ctx.restore(); ctx.textBaseline="alphabetic"; ctx.restore(); }
function drawEntity(e, hidden){ drawCharacter(e, hidden); if(hidden) return; const w=e.radius*2.4, h=7, bx=e.x-w/2, by=e.y-e.radius-20; ctx.fillStyle="rgba(0,0,0,.55)"; roundRect(bx-2,by-2,w+4,h+4,4); ctx.fill(); ctx.fillStyle="#2b2b2b"; roundRect(bx,by,w,h,3); ctx.fill(); ctx.fillStyle = (e.team===player.team)?"#3ddc97":"#ff6b6b"; roundRect(bx,by,w*Math.max(0,e.hp/e.maxHp),h,3); ctx.fill(); ctx.font="bold 9px Jua, sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.lineWidth=2.5; ctx.strokeStyle="rgba(0,0,0,.7)"; ctx.fillStyle="#fff"; const hpTxt=Math.ceil(Math.max(0,e.hp)); ctx.strokeText(hpTxt, e.x, by+h/2); ctx.fillText(hpTxt, e.x, by+h/2); ctx.textBaseline="alphabetic"; ctx.font="bold 12px Jua, sans-serif"; ctx.textAlign="center"; ctx.fillStyle="#fff"; ctx.lineWidth=3; ctx.strokeStyle="rgba(0,0,0,.6)"; ctx.strokeText(e.name,e.x,by-8); ctx.fillText(e.name,e.x,by-8); }
function drawMinimap(){ const s=0.07, mw=WORLD.w*s, mh=WORLD.h*s, mx=12, my=VH-mh-12; ctx.save(); ctx.globalAlpha=0.82; ctx.fillStyle="#0a1521"; roundRect(mx-4,my-4,mw+8,mh+8,6); ctx.fill(); ctx.strokeStyle="#2a4660";ctx.lineWidth=1;ctx.strokeRect(mx,my,mw,mh); walls.forEach(w=>{ctx.fillStyle="#33536f";ctx.fillRect(mx+w.x*s,my+w.y*s,w.w*s,w.h*s);}); entities.forEach(e=>{ if(!e.alive)return; ctx.fillStyle=e.isPlayer?"#ffd23f":"#ff6b6b"; ctx.beginPath();ctx.arc(mx+e.x*s,my+e.y*s,e.isPlayer?4:3,0,7);ctx.fill(); }); ctx.restore(); }

/* 13. MAIN LOOP */
function loop(now){
  if(!running) return;
  let dt=(now-lastT)/1000; lastT=now; if(dt>0.05)dt=0.05;
  if(hitstop>0){ hitstop-=dt; dt*=0.25; }
  window.__readPC();

  // 카운트다운 상태 중지 (렌더링만)
  if(countdownT > 0) {
      countdownT -= dt;
      updateProjectiles(dt); updateParticles(dt); updateFX(dt);
      render();
      requestAnimationFrame(loop);
      return; 
  }

  if(player.alive){
    applyMove(player, input.move.x, input.move.y, dt);
    for(let k=items.length-1;k>=0;k--){ const it=items[k]; if(Math.hypot(it.x-player.x,it.y-player.y) < it.r+player.radius) breakItem(it, player); }
    if(input.firing) tryFire(player);
    if(input.fireOnce){ tryFire(player); }
    if(input.superReq){ activateSuper(player); }
    if(input.skillReq){ activateSkill(player); }
    updateAmmo(player, dt);
  }
  input.superReq=false; input.skillReq=false; input.fireOnce=false;

  entities.forEach(e=>{ if(e.isBot&&e.alive){ updateBot(e,dt); updateAmmo(e,dt); } });
  if(mode.respawn){ entities.forEach(e=>{ if(!e.alive && e.respawnT>0){ e.respawnT-=dt; if(e.respawnT<=0) respawnEntity(e); } }); }
  updateZone(dt); updateLink(dt); updateMines(dt);
  updateProjectiles(dt); updateParticles(dt); updateFloaters(dt); updateFX(dt);
  if(mode.score) updateScoreboard();

  const la=(player.alive?50:0); const tx=player.x+(input.move.x||0)*la, ty=player.y+(input.move.y||0)*la;
  cam.x += (tx-cam.x)*Math.min(1,6*dt); cam.y += (ty-cam.y)*Math.min(1,6*dt);
  cam.zoom = cam.zoomBase*(1+cam.zoomPunch); cam.sx=(Math.random()-0.5)*shake; cam.sy=(Math.random()-0.5)*shake;

  render();
  requestAnimationFrame(loop);
}

<script type="module">
  /* ============================================================
     Firebase 실제 유저 랭킹 및 인증 (Google / Guest 연동)
     ============================================================ */
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, setDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, signInAnonymously, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // 여기에 프로젝트 구성 내용을 반드시 입력하셔야 정상 작동합니다!
  const firebaseConfig = {
    apiKey: "",
    authDomain: "",
    projectId: "",
    storageBucket: "",
    messagingSenderId: "",
    appId: ""
  };

  if (firebaseConfig.apiKey) {
    try {
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      document.getElementById('googleLoginBtn').onclick = () => { signInWithPopup(auth, provider).catch(e => console.error("Google Login Error", e)); };
      document.getElementById('guestLoginBtn').onclick = () => { signInAnonymously(auth).catch(e => console.error("Guest Login Error", e)); };

      onAuthStateChanged(auth, (user) => {
        if (user) {
          PROF.id = user.uid; pSave();
          document.getElementById('authSection').innerHTML = `<p class="tip" style="color:var(--good)">로그인됨: ${user.isAnonymous ? '게스트' : user.displayName}</p>`;
          updateMenuProfile();
        }
      });

      window.NS_FB = {
        ready: true,
        async submit(id, nick, trophies, wins) {
          try { await setDoc(doc(db, "leaderboard", id), { nick, trophies, wins, updatedAt: Date.now() }, { merge: true }); } catch (e) {}
        },
        async top(n) {
          try {
            const snap = await getDocs(query(collection(db, "leaderboard"), orderBy("trophies", "desc"), limit(n || 20)));
            return snap.docs.map(d => ({ id: d.id, ...d.data() }));
          } catch (e) { return null; }
        }
      };
      console.log("[NEON ANIMALS] Firebase 연결 완료");
    } catch (e) { console.warn("Firebase 초기화 실패:", e); }
  }
</script>
