<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일에서 화면 확대/축소를 방지하는 필수 메타 태그 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2인용 대난투 모바일</title>
    <!-- PeerJS 통신 라이브러리 (서버 없이 기기 간 직접 연결) -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        /* 기본 UI 및 캔버스 스타일링 */
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1e272e; overflow: hidden; font-family: '맑은 고딕', sans-serif; }
        canvas { display: block; }
        
        /* 로비 화면 (방 만들기 및 참가) */
        #lobby {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #2f3640; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white; z-index: 100;
        }
        .box {
            background: #353b48; padding: 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 85%; max-width: 400px; margin-bottom: 20px;
        }
        h1 { margin-top: 0; color: #00a8ff; }
        input {
            padding: 15px; font-size: 24px; text-align: center; width: 100%;
            border-radius: 10px; border: 2px solid #7f8fa6; text-transform: uppercase; margin: 15px 0;
        }
        button {
            padding: 15px; font-size: 20px; font-weight: bold; width: 100%;
            background: #00a8ff; color: white; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 5px 0 #0097e6; transition: 0.1s;
        }
        button:active { transform: translateY(5px); box-shadow: 0 0 0 #0097e6; }
        .join-btn { background: #4cd137; box-shadow: 0 5px 0 #44bd32; }
        .join-btn:active { box-shadow: 0 0 0 #44bd32; }
        
        /* 게임 내 UI 요소 */
        #gameUI { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #status { position: absolute; top: 20px; left: 20px; color: white; font-size: 18px; font-weight: bold; text-shadow: 1px 1px 2px black; }
        #skillBtn {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: #fbc531; color: #2f3640; padding: 15px 30px; border-radius: 30px;
            font-size: 18px; font-weight: 900; box-shadow: 0 5px 0 #e1b12c; pointer-events: auto; border: none;
        }
    </style>
</head>
<body>

<!-- 대기실 (Lobby) -->
<div id="lobby">
    <div class="box" id="hostBox">
        <h1>방 만들기</h1>
        <p>친구에게 아래 코드를 알려주세요!</p>
        <h2 id="roomCodeDisplay" style="color: #fbc531; font-size: 36px; letter-spacing: 5px;">생성 중...</h2>
        <p style="font-size: 14px; color: #7f8fa6;">※ 대기 중입니다...</p>
    </div>
    
    <h2 style="margin: 10px 0;">또는</h2>
    
    <div class="box" id="joinBox">
        <h1>방 참가하기</h1>
        <input type="text" id="joinCode" placeholder="방 코드 5자리 입력" maxlength="5">
        <button class="join-btn" onclick="joinRoom()">접속하기 🚀</button>
    </div>
    <p style="color: #7f8fa6; font-size: 12px;">※ 두 기기가 같은 와이파이에 있으면 연결이 더 빠릅니다.</p>
</div>

<!-- 게임 화면 -->
<div id="gameUI">
    <canvas id="gameCanvas"></canvas>
    <div id="status">나: 파랑 🟦 | 상대: 빨강 🟥</div>
    <button id="skillBtn">🔥 파워 스킬 (준비됨)</button>
</div>

<script>
    // ==========================================
    // 1. 네트워크 및 멀티플레이 설정 (PeerJS)
    // ==========================================
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let roomCode = '';
    for (let i = 0; i < 5; i++) roomCode += chars.charAt(Math.floor(Math.random() * chars.length));
    
    const peer = new Peer('MYBRAWL-' + roomCode); // 호스트용 Peer 객체
    let conn = null; // 연결 객체
    let gameActive = false;

    // 호스트: 내 코드가 생성되었을 때 화면에 표시
    peer.on('open', id => {
        document.getElementById('roomCodeDisplay').innerText = roomCode;
    });

    // 호스트: 누군가 내 방에 접속했을 때
    peer.on('connection', connection => {
        conn = connection;
        setupConnection();
    });

    // 게스트: 코드 입력 후 참가 버튼 클릭 시
    function joinRoom() {
        const code = document.getElementById('joinCode').value.toUpperCase();
        if (code.length !== 5) return alert('5자리 방 코드를 정확히 입력하세요.');
        conn = peer.connect('MYBRAWL-' + code);
        setupConnection();
    }

    // 연결 성공 후 공통 처리 로직
    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('gameUI').style.display = 'block';
            gameActive = true;
            resize(); // 캔버스 리사이즈
            requestAnimationFrame(gameLoop); // 게임 루프 시작
        });
        
        // 상대방으로부터 데이터를 받았을 때
        conn.on('data', data => {
            if (data.type === 'sync') {
                p2.x = data.x; p2.y = data.y;
                p2.aimAngle = data.angle; p2.hp = data.hp; p2.isDead = data.isDead;
            } else if (data.type === 'shoot') {
                data.bullets.forEach(b => bullets.push(b));
            }
        });

        conn.on('close', () => {
            alert('상대방과 연결이 끊어졌습니다.');
            location.reload();
        });
    }

    // 초당 30번 내 위치와 상태를 상대방에게 전송
    setInterval(() => {
        if (gameActive && conn && conn.open) {
            conn.send({ type: 'sync', x: p1.x, y: p1.y, angle: p1.aimAngle, hp: p1.hp, isDead: p1.isDead });
        }
    }, 33);

    // ==========================================
    // 2. 게임 엔진 및 조작 설정
    // ==========================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const MAP_W = 1500, MAP_H = 1500; // 게임 맵 크기
    
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);

    // 플레이어 객체 (p1=나, p2=상대방)
    const p1 = { x: 500, y: 500, speed: 6, maxHp: 100, hp: 100, aimAngle: 0, isDead: false };
    const p2 = { x: 1000, y: 1000, maxHp: 100, hp: 100, aimAngle: 0, isDead: false };
    
    let bullets = [];
    let particles = [];

    // 모바일 터치 조이스틱 상태 (왼쪽: 이동, 오른쪽: 조준 및 사격)
    let joyL = { active: false, id: null, ox: 0, oy: 0, x: 0, y: 0, vx: 0, vy: 0 };
    let joyR = { active: false, id: null, ox: 0, oy: 0, x: 0, y: 0, angle: 0, dragging: false };

    // 키보드(PC) 테스트용
    const keys = {};
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    // 스킬 버튼 로직
    let skillReady = true;
    let skillActive = false;
    const skillBtn = document.getElementById('skillBtn');
    
    const activateSkill = (e) => {
        e.preventDefault(); e.stopPropagation();
        if (skillReady) {
            skillActive = true; skillReady = false;
            skillBtn.innerText = '⏳ 쿨타임 중... (5초)';
            skillBtn.style.background = '#718093';
            setTimeout(() => {
                skillReady = true;
                skillBtn.innerText = '🔥 파워 스킬 (준비됨)';
                skillBtn.style.background = '#fbc531';
            }, 5000);
        }
    };
    skillBtn.addEventListener('touchstart', activateSkill, {passive: false});
    skillBtn.addEventListener('mousedown', activateSkill);

    // 모바일 터치 이벤트 핸들링
    window.addEventListener('touchstart', e => {
        if(e.target === skillBtn) return; // 스킬 버튼 터치 무시
        e.preventDefault();
        for (let i = 0; i < e.changedTouches.length; i++) {
            let t = e.changedTouches[i];
            if (t.clientX < canvas.width / 2 && !joyL.active) {
                joyL.active = true; joyL.id = t.identifier;
                joyL.ox = joyL.x = t.clientX; joyL.oy = joyL.y = t.clientY;
            } else if (t.clientX >= canvas.width / 2 && !joyR.active) {
                joyR.active = true; joyR.id = t.identifier; joyR.dragging = true;
                joyR.ox = joyR.x = t.clientX; joyR.oy = joyR.y = t.clientY;
            }
        }
    }, {passive: false});

    window.addEventListener('touchmove', e => {
        e.preventDefault();
        for (let i = 0; i < e.changedTouches.length; i++) {
            let t = e.changedTouches[i];
            if (joyL.active && t.identifier === joyL.id) {
                joyL.x = t.clientX; joyL.y = t.clientY;
                let dx = joyL.x - joyL.ox, dy = joyL.y - joyL.oy, dist = Math.hypot(dx, dy);
                if (dist > 50) { joyL.x = joyL.ox + (dx/dist)*50; joyL.y = joyL.oy + (dy/dist)*50; }
                joyL.vx = (joyL.x - joyL.ox) / 50; joyL.vy = (joyL.y - joyL.oy) / 50;
            }
            if (joyR.active && t.identifier === joyR.id) {
                joyR.x = t.clientX; joyR.y = t.clientY;
                let dx = joyR.x - joyR.ox, dy = joyR.y - joyR.oy, dist = Math.hypot(dx, dy);
                if (dist > 50) { joyR.x = joyR.ox + (dx/dist)*50; joyR.y = joyR.oy + (dy/dist)*50; }
                if (dist > 10) joyR.angle = Math.atan2(dy, dx);
                p1.aimAngle = joyR.angle; // 내 캐릭터 조준점 실시간 반영
            }
        }
    }, {passive: false});

    window.addEventListener('touchend', e => {
        e.preventDefault();
        for (let i = 0; i < e.changedTouches.length; i++) {
            let t = e.changedTouches[i];
            if (joyL.active && t.identifier === joyL.id) { joyL.active = false; joyL.vx = joyL.vy = 0; }
            if (joyR.active && t.identifier === joyR.id) {
                joyR.active = false;
                if (joyR.dragging && !p1.isDead) {
                    shoot(joyR.angle, skillActive);
                    skillActive = false; // 스킬 사용 후 1회성 초기화
                    joyR.dragging = false;
                }
            }
        }
    }, {passive: false});

    // ==========================================
    // 3. 로직 및 렌더링 함수
    // ==========================================
    function shoot(angle, isSkill = false) {
        let speed = 18;
        let newBullets = [];
        
        if (isSkill) {
            // 스킬: 3갈래 샷 (화력 1.5배 증폭)
            [-0.3, 0, 0.3].forEach(offset => {
                newBullets.push({ x: p1.x, y: p1.y, vx: Math.cos(angle + offset)*speed, vy: Math.sin(angle + offset)*speed, damage: 25, size: 12, isMine: true });
            });
        } else {
            // 일반 공격
            newBullets.push({ x: p1.x, y: p1.y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, damage: 15, size: 8, isMine: true });
        }
        
        newBullets.forEach(b => bullets.push(b));
        if (conn && conn.open) {
            // 내 총알을 상대방에게도 생성하도록 전송 (상대방 화면에서는 적군 총알이 됨)
            conn.send({ type: 'shoot', bullets: newBullets.map(b => ({...b, isMine: false})) });
        }
    }

    function createParticles(x, y, color) {
        for (let i = 0; i < 15; i++) {
            particles.push({ x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 20, color });
        }
    }

    function gameLoop() {
        if (!gameActive) return;

        // --- 1. 플레이어 이동 및 경계선 처리 ---
        if (!p1.isDead) {
            // 키보드(PC) 조작 보조
            if (!joyL.active) {
                joyL.vx = joyL.vy = 0;
                if (keys['w']) joyL.vy = -1; if (keys['s']) joyL.vy = 1;
                if (keys['a']) joyL.vx = -1; if (keys['d']) joyL.vx = 1;
            }
            p1.x = Math.max(25, Math.min(MAP_W - 25, p1.x + joyL.vx * p1.speed));
            p1.y = Math.max(25, Math.min(MAP_H - 25, p1.y + joyL.vy * p1.speed));
        }

        // --- 2. 총알 이동 및 충돌 판정 ---
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.x += b.vx; b.y += b.vy;

            // 맵 밖으로 나가면 삭제
            if (b.x < 0 || b.x > MAP_W || b.y < 0 || b.y > MAP_H) { bullets.splice(i, 1); continue; }

            // 내가 맞았을 때 피격 판정 (방어자 중심주의 - 지연시간으로 인한 억울함 방지)
            if (!b.isMine && !p1.isDead) {
                if (Math.hypot(p1.x - b.x, p1.y - b.y) < 25) { // 플레이어 반지름 25
                    p1.hp -= b.damage;
                    createParticles(p1.x, p1.y, '#ff4757');
                    bullets.splice(i, 1);
                    
                    if (p1.hp <= 0) {
                        p1.isDead = true;
                        setTimeout(() => { // 3초 후 부활
                            p1.hp = p1.maxHp; p1.isDead = false;
                            p1.x = Math.random() * (MAP_W - 200) + 100;
                            p1.y = Math.random() * (MAP_H - 200) + 100;
                        }, 3000);
                    }
                    continue;
                }
            }
            
            // 내 총알이 적에게 맞았을 때 로컬 시각적 이펙트 처리 (실제 데미지 차감은 적 기기에서)
            if (b.isMine && !p2.isDead) {
                if (Math.hypot(p2.x - b.x, p2.y - b.y) < 25) {
                    createParticles(p2.x, p2.y, '#ff4757');
                    bullets.splice(i, 1);
                }
            }
        }

        // --- 3. 그리기 (카메라 시점 이동) ---
        ctx.fillStyle = '#1e272e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        // 카메라가 내 캐릭터(p1)를 항상 화면 중앙에 맞추도록 맵 위치 조정
        ctx.translate(canvas.width / 2 - p1.x, canvas.height / 2 - p1.y);

        // 맵 그리드 라인 및 테두리 그리기
        ctx.strokeStyle = '#2f3640'; ctx.lineWidth = 2;
        for (let i = 0; i <= MAP_W; i += 100) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, MAP_H); ctx.stroke(); }
        for (let i = 0; i <= MAP_H; i += 100) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(MAP_W, i); ctx.stroke(); }
        ctx.strokeStyle = '#00a8ff'; ctx.lineWidth = 10;
        ctx.strokeRect(0, 0, MAP_W, MAP_H);

        // 총알 그리기
        bullets.forEach(b => {
            ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
            ctx.fillStyle = b.isMine ? '#00d2d3' : '#ff9f43';
            ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle; ctx.fill(); ctx.shadowBlur = 0;
        });

        // 플레이어 그리기 로직
        const drawPlayer = (p, isMe) => {
            if (p.isDead) { // 사망 시 유령화
                ctx.globalAlpha = 0.5; ctx.fillStyle = 'white'; ctx.font = '24px Arial';
                ctx.fillText('부활 중...', p.x - 45, p.y); ctx.globalAlpha = 1.0;
                return;
            }
            ctx.save();
            ctx.translate(p.x, p.y);
            // 대포(포신) 그리기
            ctx.rotate(p.aimAngle);
            ctx.fillStyle = '#7f8fa6'; ctx.fillRect(15, -10, 35, 20);
            ctx.rotate(-p.aimAngle);
            
            // 몸통
            ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI * 2);
            ctx.fillStyle = isMe ? '#0097e6' : '#e84118'; ctx.fill();
            ctx.lineWidth = 4; ctx.strokeStyle = '#f5f6fa'; ctx.stroke();
            
            // 체력바
            ctx.fillStyle = '#353b48'; ctx.fillRect(-35, -45, 70, 10);
            ctx.fillStyle = '#4cd137'; ctx.fillRect(-35, -45, 70 * Math.max(0, p.hp / p.maxHp), 10);
            ctx.restore();
        };

        drawPlayer(p2, false); // 상대방 (빨강)
        drawPlayer(p1, true);  // 내 캐릭터 (파랑)

        // 파티클 업데이트 및 그리기
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy; p.life--;
            ctx.globalAlpha = Math.max(0, p.life / 20);
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
            if (p.life <= 0) particles.splice(i, 1);
        }
        ctx.globalAlpha = 1.0;
        ctx.restore(); // 카메라 시점 복구 (이후부터는 화면 고정 UI 렌더링)

        // --- 4. 터치 조이스틱 UI 그리기 ---
        const drawJoy = (joy) => {
            if (!joy.active) return;
            ctx.beginPath(); ctx.arc(joy.ox, joy.oy, 50, 0, Math.PI * 2); 
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; ctx.fill();
            ctx.beginPath(); ctx.arc(joy.x, joy.y, 25, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)'; ctx.fill();
            
            // 조준 중일 때 점선 표시
            if(joy === joyR && joyR.dragging) {
                ctx.beginPath(); ctx.moveTo(joy.ox, joy.oy);
                ctx.lineTo(joy.ox + Math.cos(joy.angle)*150, joy.oy + Math.sin(joy.angle)*150);
                ctx.strokeStyle = 'rgba(255, 0, 0, 0.5)'; ctx.lineWidth = 4; ctx.setLineDash([10, 10]); ctx.stroke(); ctx.setLineDash([]);
            }
        };
        drawJoy(joyL);
        drawJoy(joyR);

        requestAnimationFrame(gameLoop);
    }
</script>

</body>
</html>
